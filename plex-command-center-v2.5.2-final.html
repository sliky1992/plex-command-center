<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;

const fmt = (s) => {
  if(!s) return '0:00';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);
  return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;
};
const fmtBytes = (b) => {
  if(!b) return '0 B';
  const k=1024,s=['B','KB','MB','GB','TB'];
  const i=Math.floor(Math.log(b)/Math.log(k));
  return (b/Math.pow(k,i)).toFixed(1)+' '+s[i];
};
const fmtUptime = (s) => {
  if(!s) return 'Unknown';
  const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);
  return d>0?`${d}d ${h}h ${m}m`:`${h}h ${m}m`;
};
const ago = (dateStr) => {
  const d = new Date(dateStr);
  const diff = Date.now()-d;
  const days=Math.floor(diff/86400000),hrs=Math.floor(diff/3600000),mins=Math.floor(diff/60000);
  if(days>0) return `${days}d ago`;
  if(hrs>0) return `${hrs}h ago`;
  return `${mins}m ago`;
};

function LtvVideoPlayer({ streamUrl, streamType, offsetSec, onEnded }) {
  const videoRef = React.useRef(null);
  const onEndedRef = React.useRef(onEnded);
  onEndedRef.current = onEnded;

  React.useEffect(() => {
    const video = videoRef.current;
    if (!video || !streamUrl) return;

    let advancing = false;
    const advance = () => {
      if (advancing) return;
      advancing = true;
      if (onEndedRef.current) onEndedRef.current();
    };

    // Both direct play and progressive transcode use native video element
    video.src = streamUrl;

    const onLoadedMetadata = () => {
      // For direct play, seek to the offset position
      if (streamType === 'direct' && offsetSec > 0) {
        video.currentTime = offsetSec;
      }
      video.play().catch(() => {});
    };

    const handleEnded = () => advance();
    const handleError = () => {
      console.warn('LtvVideoPlayer: stream error, advancing to next program');
      advance();
    };
    // Stall detection: if the video hasn't progressed in 15s, advance
    let stallTimer = null;
    const handleStalled = () => {
      if (stallTimer) clearTimeout(stallTimer);
      stallTimer = setTimeout(() => {
        console.warn('LtvVideoPlayer: stream stalled for 15s, advancing');
        advance();
      }, 15000);
    };
    const handlePlaying = () => {
      if (stallTimer) { clearTimeout(stallTimer); stallTimer = null; }
    };

    video.addEventListener('loadedmetadata', onLoadedMetadata);
    video.addEventListener('ended', handleEnded);
    video.addEventListener('error', handleError);
    video.addEventListener('stalled', handleStalled);
    video.addEventListener('playing', handlePlaying);
    // Try to play immediately too (for transcode streams that already have offset baked in)
    video.play().catch(() => {});

    return () => {
      video.removeEventListener('loadedmetadata', onLoadedMetadata);
      video.removeEventListener('ended', handleEnded);
      video.removeEventListener('error', handleError);
      video.removeEventListener('stalled', handleStalled);
      video.removeEventListener('playing', handlePlaying);
      if (stallTimer) clearTimeout(stallTimer);
      video.pause();
      video.src = '';
    };
  }, [streamUrl, streamType, offsetSec]);

  return React.createElement('video', {
    ref: videoRef,
    controls: true,
    autoPlay: true,
    style: { width: '100%', height: '100%', objectFit: 'contain', background: '#000' }
  });
}

      const data = await fetch(`/api/livetv/watch/${channelId}`).then(r=>r.json());
      if (data.offAir) {
        let msg = 'Channel is off air';
        if (data.nextOnAirTime) {
          const rt = new Date(data.nextOnAirTime);
          const hh = String(rt.getHours()).padStart(2,'0');
          const mm = String(rt.getMinutes()).padStart(2,'0');
          const isToday = rt.toDateString() === new Date().toDateString();
          msg += isToday ? `. Resumes at ${hh}:${mm}` : `. Resumes ${rt.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'})} ${hh}:${mm}`;
        }
        showToast(msg, 'error'); return;

      // If filler was skipped, retry automatically

        console.log('Filler skipped, retrying watch...');

        return;

      if (data.error) { showToast(data.error, 'error'); return; }

    <div style={{display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',flexDirection:'column',gap:'1rem'}}>
      <div className="spinner"/>
      <p style={{color:'#94a3b8'}}>Loading Plex Command Center...</p>
    </div>
  );

  return (
    <div>
      {/* TOAST */}
      {toast && (
        <div style={{position:'fixed',bottom:'2rem',right:'2rem',zIndex:9999,padding:'1rem 1.5rem',borderRadius:'10px',fontWeight:600,fontSize:'.875rem',boxShadow:'0 10px 30px rgba(0,0,0,.5)',animation:'slideup .3s'}}
          className={`alert-${toast.type}`}>
          {toast.msg}
        </div>
      )}

      {/* HEADER */}
      <header className="header">
        <div className="header-content">
          <div className="logo">
            <div className="logo-icon">🎬</div>
            <div className="logo-text">
              <h1>Plex Command Center</h1>
              {status?.friendlyName && <div className="server-name">📡 {status.friendlyName}</div>}
              <p>Advanced monitoring & control</p>
            </div>
          </div>
          <nav className="nav">
            <button className={`nav-btn ${tab==='dashboard'?'active':''}`} onClick={()=>setTab('dashboard')}>Dashboard</button>
            <button className={`nav-btn ${tab==='streams'?'active':''}`} onClick={()=>setTab('streams')}>
              Active Streams {streams.length>0&&<span className="badge">{streams.length}</span>}
            </button>
            <button className={`nav-btn ${tab==='users'?'active':''}`} onClick={()=>setTab('users')}>Top Users</button>
            <button className={`nav-btn ${tab==='history'?'active':''}`} onClick={()=>{setTab('history');loadHistory();}}>Watch History</button>
            <button className={`nav-btn ${tab==='system'?'active':''}`} onClick={()=>setTab('system')}>System</button>
            <button className={`nav-btn ${tab==='tools'?'active':''}`} onClick={()=>setTab('tools')}>Tools</button>
            {currentUser?.role==='admin' && <button className={`nav-btn ${tab==='security'?'active':''}`} onClick={()=>{setTab('security');loadSecLive();loadSecBlocked();}}>Security</button>}
            {currentUser?.role==='admin' && <button className={`nav-btn ${tab==='admin'?'active':''}`} onClick={()=>{setTab('admin');loadAdminUsers();}}>Admin</button>}
            <button className={`nav-btn ${tab==='livetv'?'active':''}`} onClick={()=>setTab('livetv')}>Live TV</button>
            <div style={{display:'flex',alignItems:'center',gap:'.5rem',marginLeft:'.5rem',paddingLeft:'.75rem',borderLeft:'1px solid rgba(100,116,139,.2)'}}>
              {currentUser?.plex_thumb ? <img src={currentUser.plex_thumb} style={{width:28,height:28,borderRadius:'50%'}}/> : <div className="avatar" style={{width:28,height:28,fontSize:'.7rem'}}>{currentUser?.username?.[0]?.toUpperCase()}</div>}
              <span style={{fontSize:'.8rem',color:'#cbd5e1'}}>{currentUser?.username}</span>
              <button className="btn-sm btn-outline" onClick={doLogout} style={{marginLeft:'.25rem'}}>Logout</button>
            </div>
          </nav>
          <button className="hamburger" onClick={()=>setMenuOpen(!menuOpen)}>&#9776;</button>
          <div className={`mobile-menu ${menuOpen?'open':''}`}>
            {[['dashboard','Dashboard'],['streams','Active Streams'],['users','Top Users'],['history','Watch History'],['system','System'],['tools','Tools'],['livetv','Live TV']].map(([k,l])=>(
              <button key={k} className={`nav-btn ${tab===k?'active':''}`} onClick={()=>{setTab(k);setMenuOpen(false);if(k==='history')loadHistory();}}>{l}</button>
            ))}
            {currentUser?.role==='admin' && <button className={`nav-btn ${tab==='security'?'active':''}`} onClick={()=>{setTab('security');setMenuOpen(false);loadSecLive();loadSecBlocked();}}>Security</button>}
            {currentUser?.role==='admin' && <button className={`nav-btn ${tab==='admin'?'active':''}`} onClick={()=>{setTab('admin');setMenuOpen(false);loadAdminUsers();}}>Admin</button>}
            <button className="btn-sm btn-outline" onClick={doLogout} style={{margin:'.5rem'}}>Logout</button>
          </div>
        </div>
      </header>

      <main className="main">

        {/* ============ DASHBOARD ============ */}
        {tab==='dashboard' && (
          <div>
            <div className="page-title">
              Dashboard
              <button className="btn btn-outline btn-sm" onClick={()=>setWidgetSettings(true)}>⚙️ Customize</button>
            </div>
            <div className="grid">

              {/* Server Status Widget */}
              {widgets.includes('serverStatus') && (
                <div className="card clickable" onClick={()=>setServerModal(true)}>
                  <div className="card-header">
                    <div className="card-title">🖥️ Server Status</div>
                    <div className="dot"/>
                  </div>
                  <div className="big-val">{status?.online?'Online':'Offline'}</div>
                  <div className="sub-label">{status?.friendlyName || 'Plex Server'}</div>
                  <div className="sub-label" style={{marginTop:'.5rem',color:'#60a5fa',fontSize:'.75rem'}}>
                    Click for details →
                  </div>
                </div>
              )}

              {/* Active Streams Widget */}
              {widgets.includes('activeStreams') && (
                <div className="card clickable" onClick={()=>setTab('streams')}>
                  <div className="card-header">
                    <div className="card-title">▶️ Active Streams</div>
                  </div>
                  <div className="big-val">{streams.length}</div>
                  <div className="sub-label">Currently watching</div>
                  {streams.slice(0,2).map((s,i)=>(
                    <div key={i} style={{marginTop:'.5rem',fontSize:'.75rem',color:'#94a3b8',display:'flex',gap:'.5rem',alignItems:'center'}}>
                      <span>👤 {s.user}</span>
                      <span style={{color:'#60a5fa'}}>•</span>
                      <span>{s.content?.substring(0,25)}{s.content?.length>25?'...':''}</span>
                    </div>
                  ))}
                </div>
              )}

              {/* System Alerts Widget */}
              {widgets.includes('systemAlerts') && (
                <div className="card">
                  <div className="card-header">
                    <div className="card-title">⚠️ System Alerts</div>
                  </div>
                  <div className="big-val">
                    {((cur?.cpu>80?1:0)+(cur?.memory>85?1:0)) || 0}
                  </div>
                  <div className="sub-label">
                    {(!cur?.cpu||cur?.cpu<=80)&&(!cur?.memory||cur?.memory<=85)?'All systems normal':'Issues detected'}
                  </div>
                </div>
              )}

              {/* Top User Widget */}
              {widgets.includes('topUser') && (
                <div className="card clickable" onClick={()=>setAllUsersModal(true)}>
                  <div className="card-header">
                    <div className="card-title">👑 Top User</div>
                  </div>
                  {topUsers[0] ? (
                    <>
                      <div style={{display:'flex',alignItems:'center',gap:'.75rem',marginTop:'.5rem'}}>
                        <div className="avatar">{(topUsers[0].friendly_name||topUsers[0].username||'?')[0].toUpperCase()}</div>
                        <div>
                          <div style={{fontWeight:700,fontSize:'1.1rem'}}>{topUsers[0].friendly_name||topUsers[0].username}</div>
                          <div className="sub-label">{topUsers[0].total_plays||topUsers[0].plays||0} plays</div>
                        </div>
                      </div>
                      <div className="sub-label" style={{marginTop:'.75rem',color:'#60a5fa',fontSize:'.75rem'}}>
                        Click to see all users →
                      </div>
                    </>
                  ) : (
                    <div className="sub-label">No data yet</div>
                  )}
                </div>
              )}

              {/* System Resources Widget */}
              {widgets.includes('resources') && (
                <div className="card" style={{gridColumn:'span 2'}}>
                  <div className="card-header">
                    <div className="card-title">📊 System Resources</div>
                    <div className="toggle">
                      <button className={`toggle-opt ${resMode==='plex'?'active':''}`} onClick={()=>setResMode('plex')}>Plex Server</button>
                      <button className={`toggle-opt ${resMode==='docker'?'active':''}`} onClick={()=>setResMode('docker')}>Docker</button>
                    </div>
                  </div>
                  {resMode==='plex' && cur?.available===false && (
                    <div className="alert-box alert-warn" style={{marginBottom:'1rem'}}>
                      ⚠️ {cur?.message || 'Plex server metrics require Zabbix. Add ZABBIX_URL, ZABBIX_USER, ZABBIX_PASSWORD, ZABBIX_HOST_ID to docker-compose.yml'}
                    </div>
                  )}
                  {resMode==='plex' && cur?.source==='zabbix' && (
                    <div className="alert-box alert-info" style={{marginBottom:'.75rem',fontSize:'.75rem',padding:'.5rem .75rem'}}>
                      📡 Live data from Zabbix • Host: {cur?.hostname || 'Unknown'} • Uptime: {fmtUptime(cur?.uptime)}
                    </div>
                  )}
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1.25rem'}}>
                    <div>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.35rem',fontSize:'.85rem'}}>
                        <span>CPU Usage</span>
                        <span style={{fontWeight:600,color:cur?.cpu>80?'#ef4444':cur?.cpu>60?'#f59e0b':'#10b981'}}>{parseFloat(cur?.cpu||0).toFixed(1)}%</span>
                      </div>
                      <div className="progress-wrap">
                        <div className="progress-bar" style={{width:`${cur?.cpu||0}%`,background:cur?.cpu>80?'#ef4444':cur?.cpu>60?'#f59e0b':undefined}}/>
                      </div>
                    </div>
                    <div>
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:'.35rem',fontSize:'.85rem'}}>
                        <span>Memory Usage</span>
                        <span style={{fontWeight:600,color:cur?.memory>85?'#ef4444':cur?.memory>70?'#f59e0b':'#10b981'}}>{parseFloat(cur?.memory||0).toFixed(1)}%</span>
                      </div>
                      <div className="progress-wrap">
                        <div className="progress-bar" style={{width:`${cur?.memory||0}%`,background:cur?.memory>85?'#ef4444':cur?.memory>70?'#f59e0b':undefined}}/>
                      </div>
                    </div>
                  </div>
                  <div style={{marginTop:'.75rem',fontSize:'.85rem',display:'flex',justifyContent:'space-between',color:'#94a3b8'}}>
                    <span>Network I/O</span>
                    <span>↓ {cur?.network?.rx||0} KB/s &nbsp;↑ {cur?.network?.tx||0} KB/s</span>
                  </div>
                  {cur?.disks && cur.disks.length > 0 && (
                    <div style={{marginTop:'.75rem'}}>
                      <div style={{fontSize:'.85rem',fontWeight:600,marginBottom:'.5rem',color:'#cbd5e1'}}>
                        💾 Disk Usage ({cur.disks.length} {cur.disks.length===1?'disk':'disks'})
                      </div>
                      {cur.diskChanges && (cur.diskChanges.added.length > 0 || cur.diskChanges.removed.length > 0) && (
                        <div style={{marginBottom:'.75rem'}}>
                          {cur.diskChanges.added.length > 0 && (
                            <div className="alert-box alert-success" style={{padding:'.5rem',marginBottom:'.4rem',fontSize:'.75rem'}}>
                              ➕ New disk{cur.diskChanges.added.length>1?'s':''} detected: {cur.diskChanges.added.join(', ')}
                            </div>
                          )}
                          {cur.diskChanges.removed.length > 0 && (
                            <div className="alert-box alert-error" style={{padding:'.5rem',fontSize:'.75rem'}}>
                              ⚠️ Disk{cur.diskChanges.removed.length>1?'s':''} removed: {cur.diskChanges.removed.join(', ')}
                            </div>
                          )}
                        </div>
                      )}
                      <div style={{maxHeight:'180px',overflowY:'auto',paddingRight:'.5rem'}}>
                        {cur.disks.map((d,idx)=>(
                          <div key={idx} style={{marginBottom:'.6rem'}}>
                            <div style={{display:'flex',justifyContent:'space-between',fontSize:'.8rem',marginBottom:'.25rem'}}>
                              <span style={{fontWeight:500}}>{d.label || d.name} <span style={{color:'#64748b',fontSize:'.7rem'}}>{d.mount !== d.label ? d.mount : ''}</span></span>
                              <span style={{fontWeight:600,color:d.percentage>90?'#ef4444':d.percentage>75?'#f59e0b':'#10b981'}}>
                                {d.sizeFormatted || `${d.percentage}%`}
                              </span>
                            </div>
                            <div className="progress-wrap" style={{height:'6px'}}>
                              <div className="progress-bar" style={{width:`${d.percentage}%`,background:d.percentage>90?'#ef4444':d.percentage>75?'#f59e0b':undefined}}/>
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}
                </div>
              )}

              {/* Jellyseerr Widget */}
              {widgets.includes('jellyseerr') && (
                <div className="card" style={{gridColumn:'span 2'}}>
                  <div className="card-header">
                    <div className="card-title">
                      📬 Recent Requests
                      {pendingCount>0&&<span className="badge warn">{pendingCount} pending</span>}
                    </div>
                    <button className="btn-sm btn-outline" onClick={()=>setJellyseerrModal(true)}>🔍 Search & Request</button>
                  </div>
                  {requests.length===0 ? (
                    <div style={{color:'#94a3b8',fontSize:'.875rem',textAlign:'center',padding:'1rem'}}>No requests found</div>
                  ) : (
                    requests.slice(0,4).map((req,i)=>(
                      <div key={i} className="req-card">
                        {req.posterPath
                          ? <img src={req.posterPath} className="req-poster" alt={req.title} onError={e=>{e.target.style.display='none'}}/>
                          : <div className="req-poster-placeholder">{req.type==='movie'?'🎬':'📺'}</div>
                        }
                        <div className="req-info">
                          <div className="req-title">{req.title || 'Unknown Title'}{req.year?` (${req.year})`:''}</div>
                          <div className="req-meta">by {req.requestedBy} • {ago(req.createdAt)}</div>
                        </div>
                        <div className="req-actions">
                          {req.mediaStatus===5 ? (
                            <span className="status-badge status-available">Available</span>
                          ) : req.mediaStatus===4 ? (
                            <span className="status-badge status-approved">Partial</span>
                          ) : req.mediaStatus===3 ? (
                            <span className="status-badge status-pending">Processing</span>
                          ) : req.status==='pending' ? (
                            <>
                              <button className="btn-sm btn-approve" onClick={()=>approveReq(req.id)}>✓</button>
                              <button className="btn-sm btn-decline" onClick={()=>declineReq(req.id)}>✗</button>
                            </>
                          ) : (
                            <span className={`status-badge status-${req.status}`}>{req.status}</span>
                          )}
                          <button className="btn-sm btn-delete" onClick={()=>deleteReq(req.id)}>🗑️</button>
                        </div>
                      </div>
                    ))
                  )}
                </div>
              )}

              {/* Collections Widget */}
              {widgets.includes('collections') && (
                <div className="card" style={{gridColumn:'span 4'}}>
                  <div className="card-header">
                    <div className="card-title">📚 Collections ({collections.length})</div>
                    <div style={{display:'flex',gap:'.5rem',alignItems:'center'}}>
                      {autoColSettings && (
                        <button onClick={()=>saveAutoColSettings({enabled:autoColSettings.enabled?0:1})} title={autoColSettings.enabled?`Auto-Create ON — ${autoColActive.length} active`:'Auto-Create OFF — click to enable'} style={{display:'flex',alignItems:'center',gap:'.35rem',padding:'.3rem .6rem',borderRadius:'12px',border:'none',cursor:'pointer',fontSize:'.7rem',fontWeight:700,background:autoColSettings.enabled?'linear-gradient(135deg,#10b981,#059669)':'rgba(100,116,139,.3)',color:autoColSettings.enabled?'#fff':'#94a3b8',transition:'all .2s'}}>
                          {autoColSettings.enabled ? '⚡ Auto' : '⚡ Auto'}{autoColSettings.enabled && autoColActive.length>0 ? ` (${autoColActive.length})` : ''}
                        </button>
                      )}
                      <button className="btn-sm btn-outline" onClick={()=>{setColModal(true);setColModalTab('suggestions');loadColSuggestions();}}>+ Create Collection</button>
                      <button className="btn-sm btn-outline" onClick={rotateCollections}>🔄 Rotate</button>
                    </div>
                  </div>
                  {collections.length===0 ? (
                    <div className="empty"><p>No collections found</p></div>
                  ) : (
                    <div className="col-grid">
                      {collections.slice(0,8).map((col,i)=>(
                        <div key={i} className="col-card">
                          {col.thumb
                            ? <img src={col.thumb} className="col-poster" alt={col.title} onError={e=>{e.target.parentNode.querySelector('.col-poster-ph')?.style&&(e.target.style.display='none');}}/>
                            : <div className="col-poster-ph"><span>📚</span></div>
                          }
                          <div className="col-info">
                            <div className="col-title">{col.title}</div>
                            <div className="col-count">{col.itemCount} items • {col.library} {col.pinned ? '• 📌 Pinned' : ''}</div>
                            <div className="col-actions" style={{gap:'.3rem'}}>
                              <button className="btn-sm" style={{flex:1,background:col.pinned?'linear-gradient(135deg,#f59e0b,#d97706)':'linear-gradient(135deg,#3b82f6,#2563eb)',color:'#fff',border:'none',borderRadius:'6px',cursor:'pointer',fontSize:'.7rem',padding:'.3rem'}} onClick={()=>pinCollection(col.key,!col.pinned,col.libraryKey)} title={col.pinned?'Unpin from Plex Home':'Pin to Plex Home'}>{col.pinned ? '📌 Unpin' : '📌 Pin Home'}</button>
                              <button className="btn-sm btn-delete" style={{flex:1}} onClick={()=>deleteCollection(col.key)}>🗑️ Delete</button>
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        )}

        {/* ============ ACTIVE STREAMS ============ */}
        {tab==='streams' && (
          <div>
            <div className="page-title">Active Streams ({streams.length})</div>
            {streams.length===0 ? (
              <div className="card empty"><div style={{fontSize:'3rem'}}>😴</div><h3>No active streams</h3><p>Nobody is watching right now</p></div>
            ) : streams.map((s,i)=>(
              <div key={i} className="stream-card">
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'.75rem'}}>
                  <div style={{display:'flex',gap:'.75rem',alignItems:'center'}}>
                    <div className="avatar">{s.user[0].toUpperCase()}</div>
                    <div>
                      <div style={{fontWeight:700,fontSize:'1rem'}}>{s.user}</div>
                      <div style={{fontSize:'.75rem',color:'#94a3b8'}}>📍 {s.ip} &nbsp;•&nbsp; 🖥️ {s.device}</div>
                    </div>
                  </div>
                  <div style={{display:'flex',gap:'.5rem'}}>
                    <button className="btn-sm btn-outline" onClick={()=>setStreamModal(s)}>ℹ️ Details</button>
                    <button className="btn-sm btn-delete" onClick={()=>stopStream(s.sessionId)}>⏹️ Stop</button>
                  </div>
                </div>
                <div style={{fontSize:'1rem',fontWeight:600,marginBottom:'.5rem'}}>{s.content}</div>
                <div style={{display:'flex',gap:'.5rem',marginBottom:'.75rem',flexWrap:'wrap'}}>
                  <span className="status-badge status-available">{s.quality}</span>
                  <span className="status-badge status-approved">{s.contentType}</span>
                  {s.transcoding&&<span className="status-badge status-pending">Transcoding</span>}
                  <span className="status-badge" style={{background:'rgba(100,116,139,.2)',color:'#94a3b8',border:'1px solid rgba(100,116,139,.2)'}}>{s.bandwidth} KB/s</span>
                </div>
                <div style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
                  <div className="progress-wrap" style={{flex:1,height:'8px'}}>
                    <div className="progress-bar" style={{width:`${s.progress}%`}}/>
                  </div>
                  <span style={{fontSize:'.85rem',fontWeight:700,minWidth:'40px',textAlign:'right'}}>{s.progress}%</span>
                </div>
              </div>
            ))}
          </div>
        )}

        {/* ============ TOP USERS ============ */}
        {tab==='users' && (
          <div>
            <div className="page-title">Top Users</div>
            <div className="card">
              {topUsers.length===0 ? (
                <div className="empty"><p>No user data available</p><p style={{marginTop:'.5rem',fontSize:'.875rem'}}>Check Tautulli configuration</p></div>
              ) : topUsers.map((u,i)=>(
                <div key={i} className="user-row" onClick={()=>setUserModal(u)}>
                  <div style={{width:'32px',height:'32px',borderRadius:'50%',background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:'.85rem',flexShrink:0}}>#{i+1}</div>
                  <div className="avatar" style={{width:'36px',height:'36px',fontSize:'.85rem'}}>
                    {u.user_thumb ? <img src={u.user_thumb} alt="" onError={e=>e.target.style.display='none'}/> : (u.friendly_name||u.username||'?')[0].toUpperCase()}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{fontWeight:600}}>{u.friendly_name||u.username}</div>
                    <div style={{fontSize:'.75rem',color:'#94a3b8'}}>
                      {u.total_plays||u.plays||0} plays &nbsp;•&nbsp; {Math.round(((u.total_duration||u.duration)||0)/3600)}h watched
                    </div>
                  </div>
                  <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end'}}>
                    <div style={{fontWeight:700,color:'#60a5fa',fontSize:'1.1rem'}}>{u.total_plays||0}</div>
                    <div style={{fontSize:'.7rem',color:'#94a3b8'}}>plays</div>
                  </div>
                  <span style={{color:'#94a3b8',marginLeft:'.5rem'}}>›</span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* ============ WATCH HISTORY ============ */}
        {tab==='history' && (
          <div>
            <div className="page-title">Watch History</div>
            <div style={{display:'flex',gap:'.75rem',marginBottom:'1.25rem',flexWrap:'wrap',alignItems:'center'}}>
              <select className="form-select" style={{width:'auto',minWidth:'160px'}} value={histUser} onChange={e=>setHistUser(e.target.value)}>
                <option value="">All users</option>
                {tautulliUsers.map((u,i)=><option key={i} value={u.user_id}>{u.friendly_name||u.username}</option>)}
              </select>
              <input type="text" className="form-input" placeholder="Search content..." style={{width:'280px'}} value={histSearch} onChange={e=>setHistSearch(e.target.value)} onKeyPress={e=>e.key==='Enter'&&loadHistory()}/>
              <button className="btn btn-primary btn-sm" onClick={loadHistory}>Apply Filters</button>
            </div>
            <div className="card" style={{padding:0,overflow:'hidden'}}>
              <table className="hist-table">
                <thead><tr><th>Date</th><th>User</th><th>Content</th><th>IP</th><th>Device</th><th>Duration</th></tr></thead>
                <tbody>
                  {history.length===0 ? (
                    <tr><td colSpan="6" style={{textAlign:'center',padding:'2rem',color:'#94a3b8'}}>No history data. Try clicking Apply Filters.</td></tr>
                  ) : history.map((h,i)=>(
                    <tr key={i}>
                      <td>{h.date_formatted||new Date(h.date*1000).toLocaleString()}</td>
                      <td>{h.friendly_name||h.user}</td>
                      <td>{h.full_title||h.title}</td>
                      <td>{h.ip_address}</td>
                      <td>{h.player}</td>
                      <td>{h.duration_formatted||fmt(h.duration)}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* ============ SYSTEM ============ */}
        {tab==='system' && (
          <div>
            <div className="page-title">System Information</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1.25rem',marginBottom:'1.25rem'}}>
              <div className="card">
                <div className="card-title" style={{marginBottom:'1rem'}}>📡 Plex Server</div>
                {[
                  ['Status', status?.online?'🟢 Online':'🔴 Offline'],
                  ['Name', status?.friendlyName||'Unknown'],

                        {/* Jump to Now */}
                        <button className="btn-sm btn-primary" style={{fontSize:'.7rem',padding:'.2rem .5rem'}} onClick={()=>{
                          if (ltvGuideScrollRef.current) {
                            const now = Date.now();
                            const guideStart = now - 1800000;
                            const nowPos = ((now - guideStart) / 3600000) * ltvGuideZoom;
                            ltvGuideScrollRef.current.scrollLeft = Math.max(0, nowPos - 200);
                          }
                        }}>Now</button>
                      </div>
                    </div>

                    {/* Guide grid container */}
                    {(() => {
                      const now = Date.now();
                      const guideStart = now - 1800000;
                      const guideEnd = now + 24*3600000;
                      const totalMs = guideEnd - guideStart;
                      const totalHours = totalMs / 3600000;
                      const gridWidth = totalHours * ltvGuideZoom; // pixel width of the timeline
                      const channelLabelW = 150;

                      const hourMarkers = [];
                      const startHour = new Date(guideStart);
                      startHour.setMinutes(0,0,0);
                      // Add half-hour markers too
                      for (let t = startHour.getTime(); t < guideEnd; t += 1800000) {
                        if (t >= guideStart) hourMarkers.push(t);
                      }

                      const filteredGuide = (ltvGuideFilter === 'all' ? ltvGuide : ltvGuide.filter(g => g.channel.category === ltvGuideFilter)).map(g => {
                        // Merge fillers into adjacent programs so they don't clutter the EPG
                        const merged = [];
                        for (let i = 0; i < g.programs.length; i++) {
                          const p = g.programs[i];
                          if (p.type === 'filler') {
                            // Extend the previous program's end time to cover this filler
                            if (merged.length > 0 && merged[merged.length - 1].type !== 'offair') {
                              const prev = merged[merged.length - 1];
                              prev.stop = p.stop;
                              prev.stopMs = p.stopMs;
                              prev.durationMs = prev.stopMs - prev.startMs;
                            } else {
                              // No previous program — extend the next program's start time backward
                              // For now just skip it (don't show an orphan filler block)
                            }
                            continue;
                          }
                          merged.push({...p});
                        }
                        return { ...g, programs: merged };
                      });
                      const nowPx = ((now - guideStart) / 3600000) * ltvGuideZoom;

                      return (
                        <div style={{position:'relative'}}>
                          {/* Hover tooltip */}
                          {ltvGuideHover && (
                            <div style={{position:'fixed',top:ltvGuideHover.y-10,left:Math.min(ltvGuideHover.x+10,window.innerWidth-300),zIndex:9999,
                              background:'rgba(10,14,39,.95)',border:'1px solid rgba(100,116,139,.3)',borderRadius:'8px',padding:'.75rem',
                              minWidth:'220px',maxWidth:'300px',backdropFilter:'blur(12px)',pointerEvents:'none',boxShadow:'0 8px 32px rgba(0,0,0,.5)'}}>
                              <div style={{fontWeight:700,fontSize:'.9rem',marginBottom:'.3rem',color:'#e2e8f0'}}>{ltvGuideHover.title}</div>
                              {ltvGuideHover.showTitle && <div style={{fontSize:'.8rem',color:'#a78bfa',marginBottom:'.2rem'}}>{ltvGuideHover.showTitle}</div>}
                              {ltvGuideHover.seasonNum && <div style={{fontSize:'.75rem',color:'#94a3b8'}}>S{String(ltvGuideHover.seasonNum).padStart(2,'0')}E{String(ltvGuideHover.episodeNum).padStart(2,'0')}</div>}
                              <div style={{fontSize:'.75rem',color:'#94a3b8',marginTop:'.3rem'}}>
                                {new Date(ltvGuideHover.start).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})} – {new Date(ltvGuideHover.stop).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
                                <span style={{marginLeft:'.5rem'}}>({Math.round(ltvGuideHover.durationMs/60000)} min)</span>
                              </div>
                              {ltvGuideHover.isNow && <div style={{fontSize:'.7rem',color:'#3b82f6',marginTop:'.3rem',fontWeight:600}}>NOW PLAYING — click to watch</div>}
                            </div>
                          )}

                          <div ref={ltvGuideScrollRef} style={{overflowX:'auto',overflowY:'auto',maxHeight:'calc(100vh - 250px)',position:'relative'}}
                            onScroll={()=>setLtvGuideHover(null)}>
                            <div style={{display:'flex',flexDirection:'column',minWidth:channelLabelW+gridWidth+'px'}}>
                              {/* Sticky time header */}
                              <div style={{display:'flex',position:'sticky',top:0,zIndex:20,background:'#0a0e27'}}>
                                <div style={{width:channelLabelW+'px',flexShrink:0,background:'#0a0e27',zIndex:21,borderBottom:'1px solid rgba(100,116,139,.3)'}}/>
                                <div style={{position:'relative',width:gridWidth+'px',height:'32px',borderBottom:'1px solid rgba(100,116,139,.3)'}}>
                                  {hourMarkers.map(t => {
                                    const isHour = new Date(t).getMinutes() === 0;
                                    const leftPx = ((t - guideStart) / 3600000) * ltvGuideZoom;
                                    return (
                                      <div key={t} style={{position:'absolute',left:leftPx+'px',height:'100%',
                                        borderLeft:isHour?'1px solid rgba(100,116,139,.3)':'1px solid rgba(100,116,139,.12)',
                                        display:'flex',alignItems:'flex-end',paddingLeft:'6px',paddingBottom:'4px'}}>
                                        <span style={{fontSize:isHour?'.8rem':'.65rem',color:isHour?'#94a3b8':'#475569',fontWeight:isHour?600:400}}>
                                          {new Date(t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
                                        </span>
                                      </div>
                                    );
                                  })}
                                  {/* Now line in header */}
                                  <div style={{position:'absolute',left:nowPx+'px',width:'2px',height:'100%',background:'#ef4444',zIndex:5}}/>
                                </div>
                              </div>

                              {/* Channel rows */}
                              {filteredGuide.map(g => (
                                <div key={g.channel.id} style={{display:'flex',minHeight:'70px'}}>
                                  {/* Sticky channel label */}
                                  <div style={{width:channelLabelW+'px',flexShrink:0,position:'sticky',left:0,zIndex:15,
                                    display:'flex',alignItems:'center',gap:'.4rem',padding:'.5rem .6rem',
                                    background:'rgba(10,14,39,.95)',borderRight:'1px solid rgba(100,116,139,.15)',
                                    borderBottom:'1px solid rgba(100,116,139,.08)',backdropFilter:'blur(4px)'}}>
                                    <span style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',padding:'.15rem .4rem',borderRadius:'4px',fontSize:'.7rem',fontWeight:700,flexShrink:0}}>{g.channel.number}</span>
                                    <span style={{fontSize:'.75rem',fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',color:'#e2e8f0'}}>{g.channel.name}</span>
                                  </div>
                                  {/* Program blocks */}
                                  <div style={{position:'relative',width:gridWidth+'px',borderBottom:'1px solid rgba(100,116,139,.06)',background:'rgba(15,23,42,.2)'}}>
                                    {g.programs.map((p, i) => {
                                      const pStart = Math.max(p.startMs || new Date(p.start).getTime(), guideStart);
                                      const pEnd = Math.min(p.stopMs || new Date(p.stop).getTime(), guideEnd);
                                      if (pEnd <= guideStart || pStart >= guideEnd) return null;
                                      const leftPx = ((pStart - guideStart) / 3600000) * ltvGuideZoom;
                                      const widthPx = ((pEnd - pStart) / 3600000) * ltvGuideZoom;
                                      const isNow = pStart <= now && pEnd > now;
                                      const isOffAir = p.type === 'offair';
                                      const isFiller = p.type === 'filler';
                                      const isNarrow = widthPx < 80;
                                      const isTiny = widthPx < 40;

                                      // Progress within current program
                                      const progress = isNow ? ((now - pStart) / (pEnd - pStart)) * 100 : 0;

                                      return (
                                        <div key={i}
                                          onClick={isNow ? ()=>ltvWatch(g.channel.id) : undefined}
                                          onMouseEnter={e=>setLtvGuideHover({
                                            title:p.title, showTitle:p.showTitle, seasonNum:p.seasonNum, episodeNum:p.episodeNum,
                                            start:p.start||p.startMs, stop:p.stop||p.stopMs, durationMs:(p.stopMs||new Date(p.stop).getTime())-(p.startMs||new Date(p.start).getTime()),
                                            isNow, x:e.clientX, y:e.clientY
                                          })}
                                          onMouseMove={e=>setLtvGuideHover(h=>h?{...h,x:e.clientX,y:e.clientY}:null)}
                                          onMouseLeave={()=>setLtvGuideHover(null)}
                                          style={{position:'absolute',left:leftPx+'px',width:Math.max(widthPx-2,1)+'px',top:'2px',bottom:'2px',
                                            background:isOffAir
                                              ? 'repeating-linear-gradient(45deg, rgba(30,41,59,.4), rgba(30,41,59,.4) 10px, rgba(30,41,59,.6) 10px, rgba(30,41,59,.6) 20px)'
                                              : isNow ? 'rgba(59,130,246,.2)' : isFiller ? 'rgba(139,92,246,.1)' : 'rgba(30,58,95,.25)',
                                            border:`1px solid ${isNow?'rgba(59,130,246,.5)':isFiller?'rgba(139,92,246,.2)':'rgba(100,116,139,.12)'}`,
                                            borderRadius:'4px',overflow:'hidden',cursor:isNow?'pointer':'default',
                                            transition:'background .15s',
                                            display:'flex',flexDirection:'column',justifyContent:'center',padding:isTiny?'2px':isNarrow?'3px .4rem':'.4rem .6rem',gap:'1px'}}>
                                          {/* Progress bar at bottom for currently playing */}
                                          {isNow && <div style={{position:'absolute',bottom:0,left:0,height:'3px',width:progress+'%',background:'linear-gradient(90deg,#3b82f6,#8b5cf6)',borderRadius:'0 2px 0 4px'}}/>}

                                          {isOffAir ? (
                                            !isTiny && <div style={{fontSize:'.7rem',color:'#475569',fontStyle:'italic',textAlign:'center'}}>Off Air</div>
                                          ) : isTiny ? null : (
                                            <>
                                              <div style={{fontSize:isNarrow?'.65rem':'.8rem',fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',
                                                color:isFiller?'#a78bfa':'#e2e8f0',lineHeight:1.2}}>
                                                {p.title}
                                              </div>
                                              {!isNarrow && p.showTitle && (
                                                <div style={{fontSize:'.7rem',color:'#a78bfa',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',lineHeight:1.2}}>{p.showTitle}</div>
                                              )}
                                              {!isNarrow && p.seasonNum && (
                                                <div style={{fontSize:'.6rem',color:'#64748b',lineHeight:1.2}}>S{String(p.seasonNum).padStart(2,'0')}E{String(p.episodeNum).padStart(2,'0')}</div>
                                              )}
                                            </>
                                          )}
                                        </div>
                                      );
                                    })}
                                    {/* Now line */}
                                    <div style={{position:'absolute',left:nowPx+'px',width:'2px',top:0,bottom:0,background:'#ef4444',zIndex:5,pointerEvents:'none'}}/>
                                    {/* Half-hour grid lines */}
                                    {hourMarkers.filter(t=>new Date(t).getMinutes()===0).map(t => {
                                      const lPx = ((t - guideStart) / 3600000) * ltvGuideZoom;
                                      return <div key={'g'+t} style={{position:'absolute',left:lPx+'px',width:'1px',top:0,bottom:0,background:'rgba(100,116,139,.06)',pointerEvents:'none'}}/>;
                                    })}
                                  </div>
                                </div>
                              ))}
                            </div>
                          </div>
                        </div>
                      );
                    })()}
                  </div>
                )}
              </div>
            )}

            {/* --- CHANNELS MANAGEMENT --- */}
            {ltvView==='channels' && (
              <div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
                  <div style={{fontSize:'.85rem',color:'#94a3b8'}}>{ltvChannels.length} channel{ltvChannels.length!==1?'s':''}</div>
                  <div style={{display:'flex',gap:'.5rem'}}>
                    <button className="btn btn-primary" style={{background:'linear-gradient(135deg,#10b981,#059669)'}} onClick={()=>{setLtvAutoBuild(true);setLtvABPreview(null);}}>Auto Build Channel</button>
                    <button className="btn btn-primary" onClick={()=>setLtvChannelModal('new')}>+ Manual Channel</button>
                  </div>
                </div>
                {ltvChannels.length===0 ? (
                  <div className="empty">No channels yet. Click "Scan Libraries" first, then create a channel.</div>
                ) : (
                  <div>
                    {ltvChannels.map(ch => (
                      <div key={ch.id} className="stream-card" style={{display:'flex',alignItems:'center',gap:'1rem'}}>
                        <div style={{width:'50px',height:'50px',borderRadius:'8px',overflow:'hidden',flexShrink:0,position:'relative'}}>
                          <img src={`/api/livetv/logos/${ch.id}?t=${ltvLogoKey}`} style={{width:'100%',height:'100%',objectFit:'cover'}}
                            onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='flex';}}/>
                          <div style={{width:'100%',height:'100%',background:'linear-gradient(135deg,#1e3a5f,#2d1f6e)',display:'none',alignItems:'center',justifyContent:'center',position:'absolute',top:0,left:0}}>
                            <span style={{fontWeight:700,fontSize:'1.1rem'}}>{ch.number}</span>
                          </div>
                        </div>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{display:'flex',alignItems:'center',gap:'.5rem'}}>
                            <span style={{fontWeight:600,fontSize:'.95rem'}}>{ch.name}</span>
                            {(() => {
                              const timeRules = (ch.rules || []).filter(r => r.rule_type === 'time_block');
                              if (timeRules.length === 0) return null;
                              const r = timeRules[0];
                              const days = typeof r.days_of_week === 'string' ? r.days_of_week.split(',').map(Number) : (r.days_of_week || [0,1,2,3,4,5,6]);
                              const allDays = days.length >= 7;
                              const allHours = r.start_hour === 0 && r.end_hour === 23;
                              const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
                              const dayLabel = allDays ? '' : ` | ${days.map(d=>dayNames[d]).join(',')}`;
                              const label = allHours && allDays ? '24/7' : `${String(r.start_hour||0).padStart(2,'0')}:00-${String(r.end_hour||23).padStart(2,'0')}:00${dayLabel}`;
                              return <span style={{fontSize:'.65rem',padding:'.1rem .4rem',borderRadius:'4px',background:'rgba(16,185,129,.2)',color:'#34d399',border:'1px solid rgba(16,185,129,.3)'}}>{label}</span>;
                            })()}
                          </div>
                          <div style={{fontSize:'.75rem',color:'#94a3b8'}}>
                            {(() => {
                              try {
                                const f = JSON.parse(ch.source_value);
                                return `${f.genre || '?'}${f.content_type && f.content_type !== 'all' ? ` (${f.content_type === 'episode' ? 'TV Only' : 'Movies Only'})` : ''}`;
                              } catch(e) { return ch.source_value; }
                            })()} | {ch.programCount} items
                            {ch.currentProgram && <span> | Now: {ch.currentProgram.item?.prog_title || ch.currentProgram.item?.filler_name || '?'}</span>}
                          </div>
                        </div>
                        <div style={{display:'flex',gap:'.4rem',flexShrink:0}}>
                          <button className={`btn-sm ${ch.enabled?'btn-approve':'btn-decline'}`} onClick={()=>ltvToggleChannel(ch)}>
                            {ch.enabled?'Enabled':'Disabled'}
                          </button>
                          <button className="btn-sm btn-outline" onClick={()=>ltvOpenEdit(ch)}>Edit</button>
                          <button className="btn-sm btn-outline" onClick={()=>ltvRebuildChannel(ch.id)}>Rebuild</button>
                          <button className="btn-sm btn-outline" onClick={()=>setLtvRuleModal(ch.id)}>Rules</button>
                          <button className="btn-sm btn-delete" onClick={()=>ltvDeleteChannel(ch.id)}>Delete</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* --- FILLERS --- */}
            {ltvView==='fillers' && (
              <div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>
                  <div style={{fontSize:'.85rem',color:'#94a3b8'}}>
                    {ltvFillers.length} filler{ltvFillers.length!==1?'s':''}
                    {ltvFillers.filter(f=>f.verified).length > 0 && <span style={{marginLeft:'.5rem',color:'#34d399'}}>({ltvFillers.filter(f=>f.verified).length} verified)</span>}
                  </div>
                  <div style={{display:'flex',gap:'.5rem'}}>
                    <button className="btn btn-primary" onClick={()=>{setYtModal(true);ytLoadDownloads();}}>Download from YouTube</button>
                    <button className="btn btn-primary" onClick={ltvScanTrailers}>Scan Trailers from Plex</button>
                  </div>
                </div>

                {/* Active YouTube Downloads */}
                {ytDownloads.filter(d=>d.status==='downloading'||d.status==='processing'||d.status==='pending').length > 0 && (
                  <div style={{marginBottom:'1.5rem'}}>
                    <div style={{fontSize:'.85rem',fontWeight:600,marginBottom:'.5rem'}}>Active Downloads</div>
                    {ytDownloads.filter(d=>d.status!=='done'&&d.status!=='error').map(d => (
                      <div key={d.id} className="stream-card" style={{display:'flex',alignItems:'center',gap:'1rem'}}>
                        <div style={{width:'40px',height:'40px',borderRadius:'8px',background:'rgba(239,68,68,.2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:'1.2rem'}}>⬇️</div>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:500,fontSize:'.85rem'}}>{d.title || d.url}</div>
                          <div style={{fontSize:'.7rem',color:'#94a3b8'}}>{d.quality} | {d.status}</div>
                          <div className="progress-wrap" style={{marginTop:'.3rem'}}><div className="progress-bar" style={{width:`${d.progress}%`}}></div></div>
                        </div>
                        <span style={{fontSize:'.8rem',fontWeight:700}}>{d.progress}%</span>
                        <button className="btn-sm btn-delete" onClick={()=>ytCancelDownload(d.id)}>Cancel</button>
                      </div>
                    ))}
                  </div>
                )}

                {/* Recent Downloads */}
                {ytDownloads.filter(d=>d.status==='done'||d.status==='error').length > 0 && (
                  <div style={{marginBottom:'1.5rem'}}>
                    <div style={{fontSize:'.85rem',fontWeight:600,marginBottom:'.5rem',color:'#94a3b8'}}>Recent Downloads</div>
                    {ytDownloads.filter(d=>d.status==='done'||d.status==='error').slice(0,5).map(d => (
                      <div key={d.id} className="stream-card" style={{display:'flex',alignItems:'center',gap:'1rem',opacity:d.status==='error'?.6:1}}>
                        <span className={`status-badge ${d.status==='done'?'status-approved':'status-declined'}`}>{d.status}</span>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:500,fontSize:'.85rem'}}>{d.title||'Unknown'}</div>
                          <div style={{fontSize:'.7rem',color:'#94a3b8'}}>{d.status==='done'?`${d.quality} | ${d.file_size_bytes?fmtBytes(d.file_size_bytes):''} | ${d.duration_ms?fmt(Math.floor(d.duration_ms/1000)):''}`:d.error_msg||'Failed'}</div>
                        </div>
                        <button className="btn-sm btn-delete" onClick={()=>ytCancelDownload(d.id)}>Remove</button>
                      </div>
                    ))}
                  </div>
                )}

                {ltvFillers.length===0 ? (
                  <div className="empty">No fillers. Click "Scan Trailers from Plex" or "Download from YouTube" to add filler content.</div>
                ) : (
                  <div>
                    {ltvFillers.map(f => (
                      <div key={f.id} className="stream-card" style={{display:'flex',alignItems:'center',gap:'1rem'}}>
                        <div style={{width:'40px',height:'40px',borderRadius:'8px',background:f.verified?'rgba(52,211,153,.2)':'rgba(139,92,246,.2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:'1.2rem',position:'relative'}}>
                          {f.type==='trailer'?'🎬':f.type==='bumper'?'📺':f.type==='preroll'?'🎞️':'📢'}
                          {f.verified ? <span style={{position:'absolute',bottom:'-2px',right:'-2px',fontSize:'.55rem',background:'#059669',borderRadius:'50%',width:'14px',height:'14px',display:'flex',alignItems:'center',justifyContent:'center',color:'#fff'}}>✓</span> : null}
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:500,fontSize:'.85rem'}}>{f.name}</div>
                          <div style={{fontSize:'.7rem',color:'#94a3b8'}}>
                            {f.type} | {fmt(Math.floor(f.duration_ms/1000))}
                            {f.genre && ` | ${f.genre.split(',').slice(0,2).join(', ')}`}
                            {f.content_type && ` | ${f.content_type}`}
                            {!f.verified && <span style={{color:'#f59e0b'}}> | unverified</span>}
                          </div>
                          {f.assignedChannels && f.assignedChannels.length > 0 && (
                            <div style={{fontSize:'.65rem',color:'#60a5fa',marginTop:'.15rem'}}>
                              Channels: {f.assignedChannels.map(c=>c.name).join(', ')}
                            </div>
                          )}
                        </div>
                        <div style={{display:'flex',gap:'.3rem',flexShrink:0}}>
                          <select style={{background:'rgba(15,23,42,.5)',border:'1px solid rgba(100,116,139,.2)',borderRadius:'4px',color:'#e2e8f0',fontSize:'.7rem',padding:'.2rem .3rem',cursor:'pointer'}}
                            value="" onChange={e=>{if(e.target.value)ltvAssignFillerToChannel(f.id,parseInt(e.target.value),true);e.target.value='';}}>
                            <option value="">+ Channel</option>
                            {ltvChannels.filter(ch => !(f.assignedChannels||[]).find(a=>a.id===ch.id)).map(ch =>
                              <option key={ch.id} value={ch.id}>{ch.name}</option>
                            )}
                          </select>
                          {(f.assignedChannels||[]).map(ac => (
                            <button key={ac.id} className="btn-sm" style={{fontSize:'.6rem',padding:'.1rem .3rem',background:'rgba(59,130,246,.15)',border:'1px solid rgba(59,130,246,.3)',color:'#60a5fa',borderRadius:'4px',cursor:'pointer'}}
                              onClick={()=>ltvAssignFillerToChannel(f.id,ac.id,false)} title={`Remove from ${ac.name}`}>
                              {ac.name} ✕
                            </button>
                          ))}
                          <button className="btn-sm btn-delete" onClick={()=>ltvDeleteFiller(f.id)}>Delete</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* --- SETUP / TUNER INSTRUCTIONS --- */}
            {ltvView==='setup' && (
              <div>
                <div className="card" style={{maxWidth:'700px',margin:'0 auto'}}>
                  <div className="card-header"><div className="card-title">Tuner Setup Instructions</div></div>
                  <div style={{fontSize:'.85rem',lineHeight:1.7}}>
                    <p style={{marginBottom:'1rem'}}>This app emulates an HDHomeRun tuner device. Plex will discover it automatically or you can enter the address manually.</p>

                    <div style={{marginBottom:'1.25rem'}}>
                      <div className="form-label" style={{fontWeight:700}}>Tuner Device URL (enter this in Plex)</div>
                      <div style={{display:'flex',gap:'.5rem'}}>
                        <input className="form-input" readOnly value={`${window.location.origin}`} onClick={e=>e.target.select()} style={{fontWeight:600}}/>
                        <button className="btn btn-primary" onClick={()=>{navigator.clipboard.writeText(`${window.location.origin}`);showToast('Copied!');}}>Copy</button>
                      </div>
                    </div>

                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1.25rem'}}>
                      <div>
                        <div className="form-label" style={{fontSize:'.75rem'}}>M3U URL (optional/manual)</div>
                        <div style={{display:'flex',gap:'.4rem'}}>
                          <input className="form-input" readOnly value={`${window.location.origin}/api/livetv/m3u`} onClick={e=>e.target.select()} style={{fontSize:'.75rem'}}/>

                      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
                        <div className="form-row">
                          <label className="form-label">Start Hour</label>
                          <select className="form-select" value={ltvNewRule.start_hour} onChange={e=>setLtvNewRule(p=>({...p,start_hour:parseInt(e.target.value)}))}>
                            {Array.from({length:24},(_,i)=>i).map(h=><option key={h} value={h}>{String(h).padStart(2,'0')}:00</option>)}
                          </select>
                        </div>
                        <div className="form-row">
                          <label className="form-label">End Hour</label>
                          <select className="form-select" value={ltvNewRule.end_hour} onChange={e=>setLtvNewRule(p=>({...p,end_hour:parseInt(e.target.value)}))}>
                            {Array.from({length:24},(_,i)=>i).map(h=><option key={h} value={h}>{String(h).padStart(2,'0')}:00</option>)}
                          </select>
                        </div>
                      </div>
                      <div className="form-row">
                        <label className="form-label">Days of Week</label>
                        <div style={{display:'flex',gap:'.4rem',flexWrap:'wrap'}}>
                          {[{label:'Sun',val:0},{label:'Mon',val:1},{label:'Tue',val:2},{label:'Wed',val:3},{label:'Thu',val:4},{label:'Fri',val:5},{label:'Sat',val:6}].map(({label,val}) => (
                            <button key={val} className={`btn-sm ${ltvNewRule.days_of_week.includes(val)?'btn-approve':'btn-outline'}`}
                              style={{fontSize:'.75rem',minWidth:'45px'}}
                              onClick={()=>setLtvNewRule(p=>({...p,days_of_week:p.days_of_week.includes(val)?p.days_of_week.filter(d=>d!==val):[...p.days_of_week,val]}))}>
                              {label}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                  <button className="btn btn-primary" onClick={()=>ltvAddRule(ltvRuleModal)}>Add Rule</button>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {/* ============ WIDGET SETTINGS MODAL ============ */}
      {/* YouTube Download Modal */}
      {ytModal && (
        <div className="overlay" onClick={()=>setYtModal(false)}>
          <div className="modal wide" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">Download Filler from YouTube</div>
              <button className="modal-close" onClick={()=>setYtModal(false)}>x</button>
            </div>
            <div className="form-row">
              <label className="form-label">YouTube URL</label>
              <div style={{display:'flex',gap:'.5rem'}}>
                <input className="form-input" value={ytUrl} onChange={e=>setYtUrl(e.target.value)} placeholder="https://www.youtube.com/watch?v=..." style={{flex:1}}/>
                <button className="btn btn-primary" onClick={ytCheckInfo} disabled={ytInfoLoading||!ytUrl}>{ytInfoLoading?'Checking...':'Check'}</button>
              </div>
            </div>
            {ytInfo && !ytInfo.error && (
              <div>
                <div className="card" style={{marginBottom:'1.25rem'}}>
                  <div style={{display:'flex',gap:'1rem'}}>
                    {ytInfo.thumbnail && <img src={ytInfo.thumbnail} style={{width:'160px',height:'90px',borderRadius:'8px',objectFit:'cover'}} alt=""/>}
                    <div>
                      <div style={{fontWeight:600,fontSize:'1rem',marginBottom:'.3rem'}}>{ytInfo.title}</div>
                      <div style={{fontSize:'.8rem',color:'#94a3b8'}}>{ytInfo.uploader} | Duration: {fmt(ytInfo.duration)}</div>
                      {ytInfo.description && <div style={{fontSize:'.75rem',color:'#64748b',marginTop:'.3rem'}}>{ytInfo.description}</div>}
                    </div>
                  </div>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1.25rem'}}>
                  <div className="form-row" style={{marginBottom:0}}>
                    <label className="form-label">Quality</label>
                    <select className="form-select" value={ytQuality} onChange={e=>setYtQuality(e.target.value)}>
                      <option value="360p">360p (~{ytInfo.estimates?.['360p']?fmtBytes(ytInfo.estimates['360p']):'small'})</option>
                      <option value="480p">480p (~{ytInfo.estimates?.['480p']?fmtBytes(ytInfo.estimates['480p']):'medium'})</option>
                      <option value="720p">720p (~{ytInfo.estimates?.['720p']?fmtBytes(ytInfo.estimates['720p']):'large'})</option>
                      <option value="1080p">1080p (~{ytInfo.estimates?.['1080p']?fmtBytes(ytInfo.estimates['1080p']):'largest'})</option>
                    </select>
                  </div>
                  {ytDiskSpace && (
                    <div style={{padding:'.5rem'}}>
                      <div className="form-label">Disk Space</div>
                      <div style={{fontSize:'.85rem'}}>{fmtBytes(ytDiskSpace.available)} available</div>
                      <div style={{fontSize:'.75rem',color:'#94a3b8'}}>Fillers using: {ytDiskSpace.fillersFormatted}</div>
                      {ytInfo.estimates?.[ytQuality]&&ytInfo.estimates[ytQuality]>ytDiskSpace.available&&(
                        <div className="alert-box alert-error" style={{marginTop:'.5rem',padding:'.4rem .6rem',fontSize:'.75rem'}}>Not enough space! Try lower quality.</div>
                      )}
                    </div>
                  )}
                </div>
                <div className="form-row">
                  <label className="form-label">Assign to Channels (optional)</label>
                  <div style={{display:'flex',gap:'.5rem',flexWrap:'wrap'}}>
                    {ltvChannels.map(ch=>(
                      <label key={ch.id} style={{display:'flex',alignItems:'center',gap:'.3rem',fontSize:'.8rem',cursor:'pointer',padding:'.3rem .6rem',background:ytSelectedChannels.includes(ch.id)?'rgba(59,130,246,.2)':'rgba(15,23,42,.4)',border:'1px solid',borderColor:ytSelectedChannels.includes(ch.id)?'rgba(59,130,246,.4)':'rgba(100,116,139,.2)',borderRadius:'6px'}}>
                        <input type="checkbox" checked={ytSelectedChannels.includes(ch.id)} onChange={e=>setYtSelectedChannels(prev=>e.target.checked?[...prev,ch.id]:prev.filter(x=>x!==ch.id))} style={{accentColor:'#3b82f6'}}/>
                        CH {ch.number} - {ch.name}
                      </label>
                    ))}
                  </div>
                </div>
                <button className="btn btn-primary" style={{width:'100%',padding:'.75rem',marginTop:'.5rem'}} onClick={ytStartDownload}>Download ({ytQuality})</button>
              </div>
            )}
            {ytInfo?.error && <div className="alert-box alert-error">{ytInfo.error}</div>}
          </div>
        </div>
      )}

      {widgetSettings && (
        <div className="overlay" onClick={()=>setWidgetSettings(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">⚙️ Customize Dashboard</div>
              <button className="modal-close" onClick={()=>setWidgetSettings(false)}>✕</button>
            </div>
            {WIDGET_LIST.map(w=>(
              <div key={w.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'.9rem',background:'rgba(15,23,42,.4)',borderRadius:'8px',marginBottom:'.5rem'}}>
                <span style={{fontWeight:500}}>{w.name}</span>
                <button className={`btn-sm ${widgets.includes(w.id)?'btn-approve':'btn-outline'}`}
                  onClick={()=>{
                    setWidgets(prev=>{
                      const next=prev.includes(w.id)?prev.filter(x=>x!==w.id):[...prev,w.id];
                      localStorage.setItem('widgets_v252',JSON.stringify(next));
                      return next;
                    });
                  }}>
                  {widgets.includes(w.id)?'✓ Enabled':'Disabled'}
                </button>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* --- Live TV Video Player Modal --- */}
      {ltvPlayer && (
        <div ref={ltvPlayerRef} onMouseMove={ltvPlayerMouseMove} style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'#000',zIndex:9999,cursor:ltvShowControls?'default':'none'}}>
          {/* Video fills entire screen */}
          <div style={{position:'absolute',top:0,left:0,right:0,bottom:0}}>
            <LtvVideoPlayer streamUrl={ltvPlayer.streamUrl} streamType={ltvPlayer.streamType} offsetSec={ltvPlayer.offsetSec} onEnded={() => ltvWatch(ltvPlayer.channelId)} />
          </div>

          {/* Channel logo watermark */}
          {ltvLogoSettings.enabled && ltvPlayer.channelId && (
            <img src={`/api/livetv/logos/${ltvPlayer.channelId}?t=${ltvLogoKey}`}
              onError={e=>{e.target.style.display='none'}}
              onLoad={e=>{e.target.style.display='block'}}
              style={{position:'absolute',
                width:`${ltvLogoSettings.size}px`,height:`${ltvLogoSettings.size}px`,
                objectFit:'contain',opacity:ltvLogoSettings.opacity,zIndex:10000,pointerEvents:'none',
                ...(ltvLogoSettings.position.includes('top')?{top:'12px'}:{bottom:'60px'}),
                ...(ltvLogoSettings.position.includes('left')?{left:'12px'}:ltvLogoSettings.position.includes('right')?{right:'12px'}:{left:'50%',transform:'translateX(-50%)'})
              }}/>
          )}

          {/* Top bar — now playing info + controls (shows on hover/channel switch) */}
          <div style={{position:'absolute',top:0,left:0,right:0,padding:'.75rem 1rem',background:'linear-gradient(180deg,rgba(0,0,0,.85) 0%,transparent 100%)',zIndex:10001,display:'flex',justifyContent:'space-between',alignItems:'flex-start',opacity:ltvShowControls?1:0,transition:'opacity .3s',pointerEvents:ltvShowControls?'auto':'none'}}>
            <div>
              <div style={{fontSize:'1.1rem',fontWeight:700,color:'#fff'}}>
                <span style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',padding:'.15rem .6rem',borderRadius:'4px',fontSize:'.8rem',marginRight:'.5rem'}}>CH {ltvPlayer.channelNumber}</span>
                {ltvPlayer.channelName}
              </div>
              <div style={{fontSize:'.85rem',color:'#a78bfa',marginTop:'.25rem'}}>
                {ltvPlayer.title}
                {ltvPlayer.showTitle && ` - ${ltvPlayer.showTitle}`}
                {ltvPlayer.seasonNum && ` (S${String(ltvPlayer.seasonNum).padStart(2,'0')}E${String(ltvPlayer.episodeNum).padStart(2,'0')})`}
              </div>
            </div>
            <div style={{display:'flex',gap:'.4rem',flexShrink:0}}>
              <button onClick={()=>ltvWatchFromStart(ltvPlayer.channelId)} title="Watch from Start" style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',padding:'.5rem .7rem',borderRadius:'6px',cursor:'pointer',fontWeight:600,fontSize:'.85rem',backdropFilter:'blur(8px)'}}>⏮</button>
              <button onClick={ltvToggleChList} title="Channel List" style={{background:ltvShowChList?'rgba(139,92,246,.8)':'rgba(255,255,255,.15)',border:'none',color:'#fff',padding:'.5rem .7rem',borderRadius:'6px',cursor:'pointer',fontWeight:600,fontSize:'.85rem',backdropFilter:'blur(8px)'}}>CH</button>
              <button onClick={ltvToggleSchedule} title="Schedule" style={{background:ltvShowSchedule?'rgba(139,92,246,.8)':'rgba(255,255,255,.15)',border:'none',color:'#fff',padding:'.5rem .7rem',borderRadius:'6px',cursor:'pointer',fontWeight:600,fontSize:'.85rem',backdropFilter:'blur(8px)'}}>Guide</button>
              <button onClick={ltvToggleFullscreen} title="Fullscreen" style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',padding:'.5rem .7rem',borderRadius:'6px',cursor:'pointer',fontWeight:600,fontSize:'.85rem',backdropFilter:'blur(8px)'}}>
                {document.fullscreenElement ? '⊡' : '⛶'}
              </button>
              <button onClick={ltvStopWatch} title="Close" style={{background:'rgba(239,68,68,.6)',border:'none',color:'#fff',padding:'.5rem .7rem',borderRadius:'6px',cursor:'pointer',fontWeight:600,fontSize:'.85rem',backdropFilter:'blur(8px)'}}>✕</button>
            </div>
          </div>

          {/* Channel list — left side pane */}
          <div style={{position:'absolute',top:0,left:0,bottom:0,width:'240px',background:'rgba(10,14,39,.92)',borderRight:'1px solid rgba(100,116,139,.2)',backdropFilter:'blur(12px)',zIndex:10002,transform:ltvShowChList?'translateX(0)':'translateX(-100%)',transition:'transform .3s ease',overflowY:'auto',paddingTop:'4rem'}}>
            <div style={{padding:'.5rem .75rem',fontSize:'.75rem',fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.05em'}}>Channels</div>
            {[...ltvChannels].filter(c=>c.enabled).sort((a,b)=>a.number-b.number).map(ch => {
              const isCurrent = ch.id === ltvPlayer.channelId;
              return (
                <div key={ch.id} onClick={()=>{if(!isCurrent)ltvWatch(ch.id);}} style={{display:'flex',alignItems:'center',gap:'.6rem',padding:'.6rem .75rem',cursor:isCurrent?'default':'pointer',background:isCurrent?'rgba(59,130,246,.2)':'transparent',borderLeft:isCurrent?'3px solid #3b82f6':'3px solid transparent',transition:'background .15s'}}
                  onMouseEnter={e=>{if(!isCurrent)e.currentTarget.style.background='rgba(255,255,255,.05)'}}
                  onMouseLeave={e=>{if(!isCurrent)e.currentTarget.style.background='transparent'}}>
                  <div style={{width:'32px',height:'32px',borderRadius:'6px',overflow:'hidden',flexShrink:0,position:'relative'}}>
                    <img src={`/api/livetv/logos/${ch.id}?t=${ltvLogoKey}`} style={{width:'100%',height:'100%',objectFit:'cover'}}
                      onError={e=>{e.target.style.display='none';e.target.nextSibling.style.display='flex';}}/>
                    <div style={{width:'100%',height:'100%',background:'linear-gradient(135deg,#1e293b,#334155)',display:'none',alignItems:'center',justifyContent:'center',fontSize:'.7rem',fontWeight:800,color:isCurrent?'#60a5fa':'#94a3b8',position:'absolute',top:0,left:0}}>{ch.number}</div>
                  </div>
                  <div style={{minWidth:0}}>
                    <div style={{fontSize:'.8rem',fontWeight:600,color:isCurrent?'#60a5fa':'#e2e8f0',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{ch.name}</div>
                    <div style={{fontSize:'.65rem',color:'#64748b'}}>{ch.program_count} programs</div>
                  </div>
                </div>
              );
            })}
          </div>

          {/* Schedule bar — bottom */}
          <div style={{position:'absolute',bottom:0,left:0,right:0,background:'linear-gradient(0deg,rgba(0,0,0,.9) 0%,rgba(0,0,0,.7) 80%,transparent 100%)',backdropFilter:'blur(8px)',zIndex:10001,transform:ltvShowSchedule?'translateY(0)':'translateY(100%)',transition:'transform .3s ease',padding:'.75rem 1rem .5rem'}}>
            <div style={{display:'flex',gap:'.5rem',overflowX:'auto',paddingBottom:'.25rem'}}>
              {ltvScheduleData.length === 0 ? (
                <div style={{color:'#64748b',fontSize:'.8rem',padding:'.5rem',width:'100%',textAlign:'center'}}>No schedule data</div>
              ) : ltvScheduleData.slice(0,8).map((p,i) => {
                const start = new Date(p.startMs || p.start);
                const now = Date.now();
                const isNow = p.startMs <= now && p.stopMs > now;
                const progress = isNow ? Math.min(100, ((now - p.startMs) / (p.stopMs - p.startMs)) * 100) : 0;
                return (
                  <div key={i} style={{minWidth:'160px',maxWidth:'220px',flex:'0 0 auto',padding:'.5rem .65rem',borderRadius:'8px',background:isNow?'rgba(59,130,246,.15)':'rgba(255,255,255,.04)',border:isNow?'1px solid rgba(59,130,246,.4)':'1px solid rgba(255,255,255,.06)'}}>
                    <div style={{fontSize:'.65rem',color:isNow?'#60a5fa':'#64748b',marginBottom:'.2rem',fontWeight:600}}>
                      {start.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
                      {isNow && ' — NOW'}
                    </div>
                    <div style={{fontSize:'.75rem',fontWeight:600,color:'#e2e8f0',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                      {p.title}{p.showTitle && ` - ${p.showTitle}`}
                    </div>
                    {p.seasonNum && <div style={{fontSize:'.6rem',color:'#64748b'}}>S{String(p.seasonNum).padStart(2,'0')}E{String(p.episodeNum).padStart(2,'0')}</div>}
                    <div style={{fontSize:'.6rem',color:'#475569'}}>{Math.round((p.durationMs||0)/60000)} min</div>
                    {isNow && <div style={{height:'2px',borderRadius:'1px',background:'rgba(59,130,246,.3)',marginTop:'.3rem'}}><div style={{height:'100%',borderRadius:'1px',background:'#3b82f6',width:`${progress}%`}}/></div>}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Channel switch OSD — center overlay */}
          {ltvChSwitchOsd && (
            <div style={{position:'absolute',top:'50%',left:'50%',transform:'translate(-50%,-50%)',background:'rgba(0,0,0,.85)',borderRadius:'12px',padding:'1.5rem 2.5rem',textAlign:'center',pointerEvents:'none',animation:'fadeIn .2s',zIndex:10003,backdropFilter:'blur(12px)'}}>
              <div style={{fontSize:'2rem',fontWeight:800,color:'#fff',marginBottom:'.25rem'}}>CH {ltvChSwitchOsd.number}</div>
              <div style={{fontSize:'1.1rem',fontWeight:600,color:'#a78bfa'}}>{ltvChSwitchOsd.name}</div>
              <div style={{fontSize:'.8rem',color:'#94a3b8',marginTop:'.5rem'}}>{ltvChSwitchOsd.title}{ltvChSwitchOsd.showTitle && ` - ${ltvChSwitchOsd.showTitle}`}</div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
