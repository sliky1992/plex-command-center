<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plex LiveTV</title>
  <script src="https://cdn.jsdelivr.net/npm/mpegts.js@1.7.3/dist/mpegts.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-deep: #0a0e27;
      --bg-card: #111638;
      --bg-hover: #1a1f4a;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --accent: #3b82f6;
      --accent2: #8b5cf6;
      --green: #10b981;
      --red: #ef4444;
      --yellow: #f59e0b;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-deep);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      display: flex;
      flex-direction: column;
      user-select: none;
    }

    /* Custom title bar */
    .titlebar {
      -webkit-app-region: drag;
      height: 32px;
      background: rgba(10, 14, 39, 0.95);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 8px;
      flex-shrink: 0;
      border-bottom: 1px solid rgba(100,116,139,.15);
      z-index: 100;
    }
    .titlebar-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .titlebar-title .dot { width: 8px; height: 8px; border-radius: 50%; }
    .titlebar-title .dot.connected { background: var(--green); }
    .titlebar-title .dot.disconnected { background: var(--red); }
    .titlebar-btns {
      display: flex;
      -webkit-app-region: no-drag;
    }
    .titlebar-btn {
      width: 36px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: var(--text-dim);
      cursor: pointer; font-size: 14px;
      transition: background .15s;
    }
    .titlebar-btn:hover { background: rgba(255,255,255,.1); }
    .titlebar-btn.close:hover { background: var(--red); color: white; }

    /* Main layout */
    .app { display: flex; flex: 1; overflow: hidden; }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--bg-card);
      border-right: 1px solid rgba(100,116,139,.15);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      transition: width .3s ease;
    }
    .sidebar.collapsed { width: 0; overflow: hidden; border: none; }
    .sidebar-header {
      padding: 12px 16px;
      border-bottom: 1px solid rgba(100,116,139,.15);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sidebar-header h3 { font-size: 14px; font-weight: 600; }
    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid rgba(100,116,139,.15);
    }
    .sidebar-tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 12px;
      font-weight: 500;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all .2s;
    }
    .sidebar-tab.active {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }
    .sidebar-tab:hover { color: var(--text); }

    .channel-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }
    .channel-list::-webkit-scrollbar { width: 4px; }
    .channel-list::-webkit-scrollbar-track { background: transparent; }
    .channel-list::-webkit-scrollbar-thumb { background: rgba(100,116,139,.3); border-radius: 4px; }

    .channel-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all .2s;
      margin-bottom: 4px;
    }
    .channel-item:hover { background: var(--bg-hover); }
    .channel-item.active {
      background: linear-gradient(135deg, rgba(59,130,246,.2), rgba(139,92,246,.2));
      border: 1px solid rgba(59,130,246,.3);
    }
    .channel-num {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: linear-gradient(135deg, #1e3a5f, #2d1f6e);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; flex-shrink: 0;
    }
    .channel-info { flex: 1; min-width: 0; }
    .channel-name {
      font-weight: 600; font-size: 13px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .channel-now {
      font-size: 11px; color: var(--text-dim);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      margin-top: 2px;
    }
    .channel-live {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* Guide view */
    .guide-list { flex: 1; overflow-y: auto; padding: 8px; }
    .guide-channel {
      margin-bottom: 12px;
      background: rgba(15,23,42,.3);
      border-radius: 8px;
      border: 1px solid rgba(100,116,139,.1);
      overflow: hidden;
    }
    .guide-channel-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px;
      background: rgba(15,23,42,.4);
      border-bottom: 1px solid rgba(100,116,139,.1);
      cursor: pointer;
    }
    .guide-channel-header:hover { background: rgba(15,23,42,.6); }
    .guide-program {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 12px; font-size: 12px;
      border-bottom: 1px solid rgba(100,116,139,.05);
    }
    .guide-program.now { background: rgba(59,130,246,.1); }
    .guide-time { color: var(--text-dim); font-size: 11px; white-space: nowrap; }

    /* Player area */
    .player-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #000;
      position: relative;
    }
    .video-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    /* Player overlay */
    .player-overlay {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,.85));
      padding: 40px 24px 16px;
      opacity: 0;
      transition: opacity .3s;
      z-index: 10;
    }
    .player-area:hover .player-overlay,
    .player-overlay.visible { opacity: 1; }

    .now-playing {
      margin-bottom: 12px;
    }
    .now-playing-title {
      font-size: 16px; font-weight: 700;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .now-playing-info {
      font-size: 12px; color: var(--text-dim); margin-top: 3px;
    }

    .player-controls {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .player-btn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      font-size: 18px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: background .2s;
    }
    .player-btn:hover { background: rgba(255,255,255,.15); }
    .volume-slider {
      -webkit-appearance: none;
      width: 100px; height: 4px;
      border-radius: 2px;
      background: rgba(255,255,255,.3);
      outline: none;
    }
    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      border-radius: 50%;
      background: white;
      cursor: pointer;
    }
    .player-spacer { flex: 1; }
    .progress-bar {
      height: 3px;
      background: rgba(255,255,255,.15);
      border-radius: 2px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 1s linear;
    }

    /* Empty/loading states */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--text-dim);
      gap: 12px;
    }
    .empty-state .icon { font-size: 48px; opacity: .5; }
    .empty-state p { font-size: 14px; }

    /* Setup screen */
    .setup {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
    }
    .setup h2 {
      font-size: 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .setup p { color: var(--text-dim); font-size: 14px; text-align: center; max-width: 400px; }
    .setup-input {
      width: 350px; padding: 12px 16px;
      background: var(--bg-card);
      border: 1px solid rgba(100,116,139,.3);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
    }
    .setup-input:focus { border-color: var(--accent); }
    .setup-btn {
      padding: 10px 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 8px;
      color: white;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: opacity .2s;
    }
    .setup-btn:hover { opacity: .9; }
    .setup-btn:disabled { opacity: .5; cursor: not-allowed; }
    .setup-error { color: var(--red); font-size: 12px; }
    .setup-success { color: var(--green); font-size: 12px; }

    /* Settings gear */
    .settings-btn {
      background: none; border: none;
      color: var(--text-dim); cursor: pointer;
      font-size: 16px; padding: 4px;
      border-radius: 4px; transition: all .2s;
    }
    .settings-btn:hover { color: var(--text); background: rgba(255,255,255,.1); }

    /* Sync indicator */
    .sync-indicator {
      font-size: 11px;
      color: var(--text-dim);
      padding: 6px 16px;
      border-top: 1px solid rgba(100,116,139,.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .sync-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      display: inline-block;
      margin-right: 4px;
    }
    .sync-dot.ok { background: var(--green); }
    .sync-dot.err { background: var(--red); }

    .btn-sync {
      background: none; border: none;
      color: var(--accent); cursor: pointer;
      font-size: 11px; padding: 2px 6px;
      border-radius: 4px;
    }
    .btn-sync:hover { background: rgba(59,130,246,.15); }

    /* Channel number OSD */
    .channel-osd {
      position: absolute;
      top: 20px; right: 20px;
      background: rgba(0,0,0,.8);
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 24px;
      font-weight: 700;
      z-index: 20;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
    }
    .channel-osd.visible { opacity: 1; }

    /* Floating sidebar toggle */
    .floating-toggle {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 15;
      width: 36px; height: 36px;
      border-radius: 8px;
      background: rgba(0,0,0,.6);
      border: 1px solid rgba(255,255,255,.15);
      color: white;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      backdrop-filter: blur(4px);
    }
    .floating-toggle:hover {
      background: rgba(59,130,246,.5);
      border-color: rgba(59,130,246,.6);
    }

    /* Hide UI elements in fullscreen */
    body.is-fullscreen .titlebar { display: none !important; }
    body.is-fullscreen .floating-toggle { display: none !important; }
    body.is-fullscreen .main-area { height: 100vh !important; }

    /* Reconnecting overlay */
    .reconnecting {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,.7);
      z-index: 12;
    }

    /* Spinner */
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid rgba(59,130,246,.2);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Title bar -->
  <div class="titlebar">
    <div class="titlebar-title">
      <span class="dot" id="connDot"></span>
      <span>Plex LiveTV</span>
      <span id="titleChannel" style="color:#60a5fa"></span>
    </div>
    <div class="titlebar-btns">
      <button class="titlebar-btn" onclick="electronAPI.minimize()" title="Minimize">&#x2013;</button>
      <button class="titlebar-btn" onclick="electronAPI.maximize()" title="Maximize">&#x25A1;</button>
      <button class="titlebar-btn close" onclick="electronAPI.close()" title="Close">&#x2715;</button>
    </div>
  </div>

  <!-- Setup screen (shown when no server configured) -->
  <div class="app" id="setupScreen" style="display:none">
    <div class="setup">
      <div style="font-size:64px">📺</div>
      <h2>Plex LiveTV</h2>
      <p>Enter your Plex Command Center server URL to connect and start watching live TV channels.</p>
      <input type="text" class="setup-input" id="serverInput" placeholder="http://192.168.1.100:3001" />
      <button class="setup-btn" id="connectBtn" onclick="testAndConnect()">Connect</button>
      <div id="setupStatus"></div>
    </div>
  </div>

  <!-- Main app -->
  <div class="app" id="mainApp" style="display:none">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h3>📺 Channels</h3>
        <button class="settings-btn" onclick="showSetup()" title="Settings">⚙</button>
      </div>
      <div class="sidebar-tabs">
        <button class="sidebar-tab active" id="tabChannels" onclick="switchTab('channels')">Channels</button>
        <button class="sidebar-tab" id="tabGuide" onclick="switchTab('guide')">TV Guide</button>
      </div>

      <!-- Channel list -->
      <div class="channel-list" id="channelList"></div>

      <!-- Guide list -->
      <div class="guide-list" id="guideList" style="display:none"></div>

      <div class="sync-indicator">
        <span><span class="sync-dot" id="syncDot"></span><span id="syncText">Syncing...</span></span>
        <button class="btn-sync" onclick="syncChannels()">Refresh</button>
      </div>
    </div>

    <!-- Player -->
    <div class="player-area" id="playerArea">
      <div class="video-container" id="videoContainer">
        <video id="videoPlayer" autoplay></video>
        <div class="empty-state" id="emptyPlayer">
          <div class="icon">📺</div>
          <p>Select a channel to start watching</p>
          <p style="font-size:12px;color:#64748b">Use ↑/↓ arrows or number keys to switch channels</p>
        </div>
      </div>

      <div class="channel-osd" id="channelOSD"></div>

      <!-- Channel logo watermark -->
      <img id="channelLogo" style="position:absolute;pointer-events:none;z-index:5;display:none;object-fit:contain" />

      <!-- Always-visible floating toggle button -->
      <button class="floating-toggle" id="sidebarToggle" onclick="toggleSidebar()" title="Toggle Channel List (S)">☰</button>

      <!-- Reconnecting overlay -->
      <div class="reconnecting" id="reconnecting" style="display:none">
        <div class="spinner"></div>
        <div style="margin-top:12px;font-size:13px;color:#94a3b8">Reconnecting...</div>
      </div>

      <div class="player-overlay" id="playerOverlay">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="now-playing">
          <div class="now-playing-title" id="nowTitle">-</div>
          <div class="now-playing-info" id="nowInfo">-</div>
        </div>
        <div class="player-controls">
          <button class="player-btn" onclick="prevChannel()" title="Previous Channel (↑)">⏮</button>
          <button class="player-btn" onclick="nextChannel()" title="Next Channel (↓)">⏭</button>
          <button class="player-btn" id="muteBtn" onclick="toggleMute()" title="Mute (M)">🔊</button>
          <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
          <div class="player-spacer"></div>
          <button class="player-btn" onclick="toggleSidebar()" title="Toggle Sidebar (S)">☰</button>
          <button class="player-btn" onclick="electronAPI.toggleFullscreen()" title="Fullscreen (F)">⛶</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // State
    let state = {
      serverUrl: '',
      channels: [],
      currentChannel: null,
      volume: 80,
      muted: false,
      player: null,
      syncInterval: null,
      nowPlayingInterval: null,
      guideData: [],
      sidebarTab: 'channels',
      numberBuffer: '',
      numberTimeout: null,
      osdTimeout: null,
      lastChannel: null,
      alwaysOnTop: false,
      logoSettings: { enabled: true, position: 'top-right', opacity: 0.7, size: 80 }
    };

    const video = document.getElementById('videoPlayer');

    // ---- Init ----
    async function init() {
      const settings = await electronAPI.getSettings();
      if (settings.serverUrl) {
        state.serverUrl = settings.serverUrl;
        state.volume = settings.volume || 80;
        state.lastChannel = settings.lastChannel;
        state.alwaysOnTop = settings.alwaysOnTop || false;
        video.volume = state.volume / 100;
        document.getElementById('volumeSlider').value = state.volume;
        showMain();
        await syncChannels();
        // Auto-tune to last channel
        if (state.lastChannel && state.channels.length > 0) {
          const ch = state.channels.find(c => c.id === state.lastChannel);
          if (ch) tuneChannel(ch);
        }
      } else {
        showSetup();
      }
    }

    function showSetup() {
      document.getElementById('setupScreen').style.display = 'flex';
      document.getElementById('mainApp').style.display = 'none';
      document.getElementById('serverInput').value = state.serverUrl || '';
    }

    function showMain() {
      document.getElementById('setupScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'flex';
      startSync();
    }

    // ---- Server Connection ----
    async function testAndConnect() {
      const url = document.getElementById('serverInput').value.trim().replace(/\/+$/, '');
      const status = document.getElementById('setupStatus');
      const btn = document.getElementById('connectBtn');

      if (!url) { status.innerHTML = '<span class="setup-error">Enter a server URL</span>'; return; }

      btn.disabled = true;
      status.innerHTML = '<span style="color:#94a3b8">Connecting...</span>';

      try {
        const r = await fetch(`${url}/api/health`, { signal: AbortSignal.timeout(5000) });
        const data = await r.json();
        if (data.status === 'ok') {
          if (!data.services?.livetv) {
            status.innerHTML = '<span class="setup-error">Server connected but LiveTV is not enabled</span>';
            btn.disabled = false;
            return;
          }
          state.serverUrl = url;
          await electronAPI.saveSettings({ ...await electronAPI.getSettings(), serverUrl: url });
          status.innerHTML = '<span class="setup-success">Connected! Loading channels...</span>';
          showMain();
          await syncChannels();
        } else {
          status.innerHTML = '<span class="setup-error">Invalid response from server</span>';
        }
      } catch (e) {
        status.innerHTML = `<span class="setup-error">Failed to connect: ${e.message}</span>`;
      }
      btn.disabled = false;
    }

    // ---- Channel Sync ----
    async function syncChannels() {
      try {
        const r = await fetch(`${state.serverUrl}/api/livetv/now-playing`, { signal: AbortSignal.timeout(8000) });
        const raw = await r.json();
        // Map now-playing response to flat channel objects
        const data = raw.map(item => ({
          id: item.channel?.id || item.id,
          number: item.channel?.number || item.number,
          name: item.channel?.name || item.name,
          slug: item.channel?.slug || item.slug,
          category: item.channel?.category || item.category,
          enabled: true, // now-playing only returns enabled channels
          onAir: item.onAir !== undefined ? item.onAir : true,
          currentProgram: item.current ? {
            item: {
              prog_title: item.current.title,
              show_title: item.current.showTitle,
              filler_name: item.current.type === 'filler' ? item.current.title : null,
              duration_ms: item.current.durationMs
            },
            offsetMs: item.current.offsetMs,
            remainingMs: item.current.remainingMs
          } : null
        }));
        state.channels = data;

        document.getElementById('syncDot').className = 'sync-dot ok';
        document.getElementById('syncText').textContent = `${state.channels.length} channels | ${new Date().toLocaleTimeString()}`;
        document.getElementById('connDot').className = 'dot connected';

        renderChannels();
        updateNowPlaying();

        // Load logo settings
        try {
          const ls = await fetch(`${state.serverUrl}/api/livetv/logo-settings`, { signal: AbortSignal.timeout(5000) });
          const lsData = await ls.json();
          if (lsData && lsData.enabled !== undefined) state.logoSettings = lsData;
          updateChannelLogo();
        } catch (e) {}

        // Load guide data
        loadGuide();
      } catch (e) {
        document.getElementById('syncDot').className = 'sync-dot err';
        document.getElementById('syncText').textContent = 'Connection lost';
        document.getElementById('connDot').className = 'dot disconnected';
      }
    }

    function startSync() {
      if (state.syncInterval) clearInterval(state.syncInterval);
      state.syncInterval = setInterval(syncChannels, 15000); // Sync every 15s

      if (state.nowPlayingInterval) clearInterval(state.nowPlayingInterval);
      state.nowPlayingInterval = setInterval(updateNowPlaying, 5000);
    }

    // ---- Render Channels ----
    function renderChannels() {
      const list = document.getElementById('channelList');
      if (state.channels.length === 0) {
        list.innerHTML = '<div class="empty-state" style="padding:2rem"><p style="font-size:12px">No channels found. Create channels in the web app.</p></div>';
        return;
      }

      list.innerHTML = state.channels.map(ch => {
        const isActive = state.currentChannel && state.currentChannel.id === ch.id;
        const nowTitle = ch.currentProgram?.item?.prog_title || ch.currentProgram?.item?.filler_name || 'Off Air';
        return `
          <div class="channel-item ${isActive ? 'active' : ''}" onclick="tuneChannel(${JSON.stringify(ch).replace(/"/g, '&quot;')})" data-channel-id="${ch.id}">
            <div class="channel-num">${ch.number}</div>
            <div class="channel-info">
              <div class="channel-name">${escHtml(ch.name)}</div>
              <div class="channel-now">${escHtml(nowTitle)}</div>
            </div>
            ${ch.onAir ? '<div class="channel-live"></div>' : ''}
          </div>
        `;
      }).join('');
    }

    // ---- Guide ----
    async function loadGuide() {
      try {
        const r = await fetch(`${state.serverUrl}/api/livetv/guide?hours=6`, { signal: AbortSignal.timeout(10000) });
        state.guideData = await r.json();
        if (state.sidebarTab === 'guide') renderGuide();
      } catch (e) {}
    }

    function renderGuide() {
      const list = document.getElementById('guideList');
      if (!state.guideData || state.guideData.length === 0) {
        list.innerHTML = '<div class="empty-state" style="padding:2rem"><p style="font-size:12px">No guide data available</p></div>';
        return;
      }

      const now = Date.now();
      list.innerHTML = state.guideData.map(entry => {
        const chData = entry.channel || entry;
        const programs = (entry.programs || []).slice(0, 8);
        return `
          <div class="guide-channel">
            <div class="guide-channel-header" onclick="tuneChannelById(${chData.id})">
              <div class="channel-num" style="width:28px;height:28px;font-size:11px">${chData.number}</div>
              <span style="font-weight:600;font-size:13px">${escHtml(chData.name)}</span>
            </div>
            ${programs.map(p => {
              const start = new Date(p.start || p.startMs);
              const end = new Date(p.stop || p.end || p.stopMs);
              const isNow = now >= start.getTime() && now < end.getTime();
              const displayTitle = p.showTitle ? `${p.showTitle} - ${p.title}` : p.title;
              const epInfo = p.seasonNum ? ` S${p.seasonNum}E${p.episodeNum || '?'}` : '';
              return `
                <div class="guide-program ${isNow ? 'now' : ''}">
                  <span>${escHtml(displayTitle)}${epInfo}</span>
                  <span class="guide-time">${formatTime(start)} - ${formatTime(end)}</span>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }).join('');
    }

    function switchTab(tab) {
      state.sidebarTab = tab;
      document.getElementById('tabChannels').className = `sidebar-tab ${tab === 'channels' ? 'active' : ''}`;
      document.getElementById('tabGuide').className = `sidebar-tab ${tab === 'guide' ? 'active' : ''}`;
      document.getElementById('channelList').style.display = tab === 'channels' ? '' : 'none';
      document.getElementById('guideList').style.display = tab === 'guide' ? '' : 'none';
      if (tab === 'guide') renderGuide();
    }

    // ---- Player ----
    async function tuneChannel(ch) {
      if (state.currentChannel && state.currentChannel.id === ch.id) return;

      // Stop existing player
      stopPlayer();

      state.currentChannel = ch;
      state.lastChannel = ch.id;
      electronAPI.saveSettings({ serverUrl: state.serverUrl, volume: state.volume, lastChannel: ch.id, alwaysOnTop: state.alwaysOnTop });

      document.getElementById('emptyPlayer').style.display = 'none';
      video.style.display = 'block';
      document.getElementById('titleChannel').textContent = `Ch ${ch.number} - ${ch.name}`;

      showOSD(`Ch ${ch.number} - ${ch.name}`);
      renderChannels();
      updateChannelLogo();

      // Show buffering overlay
      document.getElementById('reconnecting').style.display = 'flex';
      const reconnLabel = document.getElementById('reconnecting').querySelector('div:last-child');
      if (reconnLabel) reconnLabel.textContent = 'Loading...';

      const channelId = ch.id;
      let reconnectTimer = null;
      let reconnectCount = 0;

      const doReconnect = (reason) => {
        if (reconnectTimer) return;
        if (!state.currentChannel || state.currentChannel.id !== channelId) return;
        reconnectCount++;
        const delay = Math.min(3000 + reconnectCount * 2000, 20000);
        console.log(`Reconnecting in ${delay}ms (${reason}), attempt #${reconnectCount}...`);
        document.getElementById('reconnecting').style.display = 'flex';
        reconnectTimer = setTimeout(() => {
          reconnectTimer = null;
          if (state.currentChannel && state.currentChannel.id === channelId) {
            stopPlayer();
            state.currentChannel = null;
            tuneChannel(ch);
          }
        }, delay);
      };

      // Use the watch API (same as web UI) for Plex direct play / Plex transcoding
      try {
        const watchData = await fetch(`${state.serverUrl}/api/livetv/watch/${ch.id}?client=desktop`).then(r => r.json());
        if (watchData.error) throw new Error(watchData.error);

        state._watchId = watchData.watchId;
        state._sessionId = watchData.sessionId;
        const streamUrl = watchData.streamUrl;
        const streamType = watchData.streamType;

        console.log(`Tuning ch ${ch.number}: ${streamType} - ${watchData.title}`);

        // For direct play and Plex transcode, use native video element (no mpegts.js needed)
        video.src = streamUrl;
        video.volume = state.muted ? 0 : state.volume / 100;

        if (streamType === 'direct' && watchData.offsetSec > 0) {
          video.addEventListener('loadedmetadata', () => {
            video.currentTime = watchData.offsetSec;
          }, { once: true });
        }

        video.addEventListener('playing', () => {
          document.getElementById('reconnecting').style.display = 'none';
          reconnectCount = 0;
        }, { once: false });

        // When current program ends, auto-tune to next program
        video.addEventListener('ended', () => {
          console.log('Program ended, re-tuning...');
          stopPlayer();
          state.currentChannel = null;
          tuneChannel(ch);
        });

        video.play().catch(e => console.log('Autoplay blocked:', e.message));

        // Heartbeat to keep watch session alive
        state._heartbeat = setInterval(() => {
          if (state._watchId) {
            fetch(`${state.serverUrl}/api/livetv/watch/heartbeat`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ watchId: state._watchId })
            }).catch(() => {});
          }
        }, 10000);

        // Stall detection (much simpler for native player)
        let lastPos = 0;
        let stallCount = 0;
        state._stallCheck = setInterval(() => {
          if (!state.currentChannel || state.currentChannel.id !== channelId) {
            clearInterval(state._stallCheck);
            return;
          }
          if (video.paused && !video.ended) {
            video.play().catch(() => {});
          }
          const pos = video.currentTime;
          if (pos > 0 && pos === lastPos && !video.paused) {
            stallCount++;
            if (stallCount >= 15) { // 45s stall
              clearInterval(state._stallCheck);
              doReconnect('stalled for 45s');
            }
          } else {
            stallCount = 0;
          }
          lastPos = pos;
        }, 3000);

      } catch (e) {
        console.error('Watch API failed, falling back to MPEG-TS stream:', e.message);
        // Fallback to MPEG-TS stream if watch API fails
        const streamUrl = `${state.serverUrl}/api/livetv/stream/${ch.id}.ts`;

        if (mpegts.isSupported()) {
          state.player = mpegts.createPlayer({
            type: 'mpegts',
            url: streamUrl,
            isLive: true
          }, {
            enableWorker: true,
            enableStashBuffer: true,
            stashInitialSize: 2097152,
            liveBufferLatencyChasing: false,
            lazyLoad: false,
            autoCleanupSourceBuffer: true,
            autoCleanupMaxBackwardDuration: 120,
            autoCleanupMinBackwardDuration: 60,
            fixAudioTimestampGap: true,
            seekType: 'range'
          });

          state.player.attachMediaElement(video);
          state.player.load();
          video.volume = state.muted ? 0 : state.volume / 100;

          state.player.on(mpegts.Events.ERROR, (type, detail) => {
            console.error('Player error:', type, detail);
            if (detail === 'NetworkError' || detail === 'MediaError') {
              doReconnect('error: ' + detail);
            }
          });

          video.addEventListener('playing', () => {
            document.getElementById('reconnecting').style.display = 'none';
            reconnectCount = 0;
          });

          let lastPos2 = 0, stallCount2 = 0;
          state._stallCheck = setInterval(() => {
            if (!state.currentChannel || state.currentChannel.id !== channelId) {
              clearInterval(state._stallCheck); return;
            }
            if (video.paused && !video.ended && state.player) video.play().catch(() => {});
            const pos = video.currentTime;
            if (pos > 0 && pos === lastPos2 && !video.paused) {
              stallCount2++;
              if (stallCount2 >= 10) { clearInterval(state._stallCheck); doReconnect('stalled'); }
            } else { stallCount2 = 0; }
            lastPos2 = pos;
          }, 3000);

          setTimeout(() => video.play().catch(() => {}), 2000);
        }
      }

      updateNowPlaying();
    }

    function tuneChannelById(id) {
      const ch = state.channels.find(c => c.id === id);
      if (ch) tuneChannel(ch);
    }

    function stopPlayer() {
      if (state._stallCheck) {
        clearInterval(state._stallCheck);
        state._stallCheck = null;
      }
      if (state._heartbeat) {
        clearInterval(state._heartbeat);
        state._heartbeat = null;
      }
      // Stop watch session
      if (state._watchId && state.serverUrl) {
        fetch(`${state.serverUrl}/api/livetv/watch/stop`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ watchId: state._watchId, sessionId: state._sessionId })
        }).catch(() => {});
        state._watchId = null;
        state._sessionId = null;
      }
      document.getElementById('reconnecting').style.display = 'none';
      if (state.player) {
        try {
          state.player.pause();
          state.player.unload();
          state.player.detachMediaElement();
          state.player.destroy();
        } catch (e) {}
        state.player = null;
      }
      // Also stop native video
      try {
        video.pause();
        video.removeAttribute('src');
        video.load();
      } catch (e) {}
    }

    function updateChannelLogo() {
      const logo = document.getElementById('channelLogo');
      if (!state.logoSettings.enabled || !state.currentChannel) {
        logo.style.display = 'none';
        return;
      }
      const s = state.logoSettings;
      logo.src = `${state.serverUrl}/api/livetv/logos/${state.currentChannel.id}?t=${Date.now()}`;
      logo.style.width = s.size + 'px';
      logo.style.height = s.size + 'px';
      logo.style.opacity = s.opacity;
      // Reset positioning
      logo.style.top = logo.style.bottom = logo.style.left = logo.style.right = 'auto';
      logo.style.transform = '';
      if (s.position.includes('top')) logo.style.top = '12px'; else logo.style.bottom = '60px';
      if (s.position.includes('left')) logo.style.left = '12px';
      else if (s.position.includes('right')) logo.style.right = '12px';
      else { logo.style.left = '50%'; logo.style.transform = 'translateX(-50%)'; }
      logo.style.display = 'block';
      logo.onerror = () => { logo.style.display = 'none'; };
    }

    function updateNowPlaying() {
      if (!state.currentChannel) return;
      const ch = state.channels.find(c => c.id === state.currentChannel.id);
      if (!ch || !ch.currentProgram) return;

      const prog = ch.currentProgram;
      const title = prog.item?.prog_title || prog.item?.filler_name || 'Unknown';
      const showTitle = prog.item?.show_title;
      document.getElementById('nowTitle').textContent = showTitle ? `${showTitle} - ${title}` : title;

      const remaining = prog.remainingMs ? Math.ceil(prog.remainingMs / 60000) : 0;
      const duration = prog.item?.duration_ms ? Math.ceil(prog.item.duration_ms / 60000) : 0;
      document.getElementById('nowInfo').textContent = `Ch ${ch.number} | ${remaining}min remaining of ${duration}min`;

      // Progress
      if (prog.offsetMs && prog.item?.duration_ms) {
        const pct = Math.min(100, (prog.offsetMs / prog.item.duration_ms) * 100);
        document.getElementById('progressFill').style.width = pct + '%';
      }
    }

    // ---- Controls ----
    function nextChannel() {
      if (state.channels.length === 0) return;
      const idx = state.currentChannel ? state.channels.findIndex(c => c.id === state.currentChannel.id) : -1;
      const next = (idx + 1) % state.channels.length;
      tuneChannel(state.channels[next]);
    }

    function prevChannel() {
      if (state.channels.length === 0) return;
      const idx = state.currentChannel ? state.channels.findIndex(c => c.id === state.currentChannel.id) : 0;
      const prev = (idx - 1 + state.channels.length) % state.channels.length;
      tuneChannel(state.channels[prev]);
    }

    function toggleMute() {
      state.muted = !state.muted;
      video.volume = state.muted ? 0 : state.volume / 100;
      document.getElementById('muteBtn').textContent = state.muted ? '🔇' : '🔊';
    }

    function setVolume(val) {
      state.volume = parseInt(val);
      state.muted = false;
      video.volume = state.volume / 100;
      document.getElementById('muteBtn').textContent = state.volume === 0 ? '🔇' : '🔊';
      electronAPI.saveSettings({ serverUrl: state.serverUrl, volume: state.volume, lastChannel: state.lastChannel, alwaysOnTop: state.alwaysOnTop });
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      sidebar.classList.toggle('collapsed');
      const btn = document.getElementById('sidebarToggle');
      btn.textContent = sidebar.classList.contains('collapsed') ? '☰' : '✕';
    }

    function showOSD(text) {
      const osd = document.getElementById('channelOSD');
      osd.textContent = text;
      osd.classList.add('visible');
      if (state.osdTimeout) clearTimeout(state.osdTimeout);
      state.osdTimeout = setTimeout(() => osd.classList.remove('visible'), 3000);
    }

    // ---- Keyboard shortcuts ----
    document.addEventListener('keydown', (e) => {
      // Don't capture when typing in input
      if (e.target.tagName === 'INPUT') return;

      switch (e.key) {
        case 'ArrowUp': e.preventDefault(); prevChannel(); break;
        case 'ArrowDown': e.preventDefault(); nextChannel(); break;
        case 'ArrowRight': e.preventDefault(); setVolume(Math.min(100, state.volume + 5)); document.getElementById('volumeSlider').value = state.volume; break;
        case 'ArrowLeft': e.preventDefault(); setVolume(Math.max(0, state.volume - 5)); document.getElementById('volumeSlider').value = state.volume; break;
        case 'm': case 'M': toggleMute(); break;
        case 'f': case 'F': electronAPI.toggleFullscreen(); break;
        case 's': case 'S': toggleSidebar(); break;
        case 'g': case 'G': switchTab(state.sidebarTab === 'guide' ? 'channels' : 'guide'); break;
        case 'Escape':
          electronAPI.isFullscreen().then(fs => { if (fs) electronAPI.toggleFullscreen(); });
          break;
        default:
          // Number keys for direct channel tuning
          if (/^[0-9]$/.test(e.key)) {
            state.numberBuffer += e.key;
            showOSD(`Ch ${state.numberBuffer}_`);
            if (state.numberTimeout) clearTimeout(state.numberTimeout);
            state.numberTimeout = setTimeout(() => {
              const num = parseInt(state.numberBuffer);
              state.numberBuffer = '';
              const ch = state.channels.find(c => c.number === num);
              if (ch) tuneChannel(ch);
              else showOSD(`Ch ${num} not found`);
            }, 1500);
          }
      }
    });

    // Double-click for fullscreen
    document.getElementById('videoContainer').addEventListener('dblclick', () => {
      electronAPI.toggleFullscreen();
    });

    // ---- Helpers ----
    function escHtml(str) {
      if (!str) return '';
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function formatTime(d) {
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // ---- Fullscreen state ----
    electronAPI.onFullscreenChanged((isFs) => {
      document.body.classList.toggle('is-fullscreen', isFs);
    });

    // ---- Start ----
    init();
  </script>
</body>
</html>
