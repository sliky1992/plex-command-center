<body>
<div id="root"></div>
<script type="text/babel">
const {useState, useEffect, useCallback, useRef} = React;

const fmt = (s) => {
  if(!s) return '0:00';
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=Math.floor(s%60);
  return h>0?`${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`:`${m}:${String(sec).padStart(2,'0')}`;
};
const fmtBytes = (b) => {
  if(!b) return '0 B';
  const k=1024,s=['B','KB','MB','GB','TB'];
  const i=Math.floor(Math.log(b)/Math.log(k));
  return (b/Math.pow(k,i)).toFixed(1)+' '+s[i];
};
const fmtUptime = (s) => {
  if(!s) return 'Unknown';
  const d=Math.floor(s/86400),h=Math.floor((s%86400)/3600),m=Math.floor((s%3600)/60);
  return d>0?`${d}d ${h}h ${m}m`:`${h}h ${m}m`;
};
const ago = (dateStr) => {
  const d = new Date(dateStr);
  const diff = Date.now()-d;
  const days=Math.floor(diff/86400000),hrs=Math.floor(diff/3600000),mins=Math.floor(diff/60000);
  if(days>0) return `${days}d ago`;
  if(hrs>0) return `${hrs}h ago`;
  return `${mins}m ago`;
};

function App() {
  // Auth state
  const [authState, setAuthState] = useState('checking'); // checking, login, authenticated
  const [currentUser, setCurrentUser] = useState(null);
  const [loginError, setLoginError] = useState('');
  const [loginUser, setLoginUser] = useState('');
  const [loginPass, setLoginPass] = useState('');
  const [loginLoading, setLoginLoading] = useState(false);
  const [adminUsers, setAdminUsers] = useState([]);
  const [adminUserModal, setAdminUserModal] = useState(false);
  const [newUser, setNewUser] = useState({username:'',password:'',role:'viewer'});

  // Security state
  const [secView, setSecView] = useState('live');
  const [secLive, setSecLive] = useState([]);
  const [secHistory, setSecHistory] = useState([]);
  const [secBlocked, setSecBlocked] = useState([]);
  const [secDaysFilter, setSecDaysFilter] = useState(7);
  const [blockModal, setBlockModal] = useState(null); // {type, value}
  const [blockReason, setBlockReason] = useState('');

  const [tab, setTab] = useState('dashboard');
  const [status, setStatus] = useState(null);
  const [plexRes, setPlexRes] = useState(null);
  const [dockerRes, setDockerRes] = useState(null);
  const [resMode, setResMode] = useState('plex');
  const [streams, setStreams] = useState([]);
  const [requests, setRequests] = useState([]);
  const [collections, setCollections] = useState([]);
  const [topUsers, setTopUsers] = useState([]);
  const [tautulliUsers, setTautulliUsers] = useState([]);
  const [history, setHistory] = useState([]);
  const [libraries, setLibraries] = useState([]);
  const [loading, setLoading] = useState(true);

  // Modals
  const [serverModal, setServerModal] = useState(false);
  const [userModal, setUserModal] = useState(null);
  const [allUsersModal, setAllUsersModal] = useState(false);
  const [jellyseerrModal, setJellyseerrModal] = useState(false);
  const [colModal, setColModal] = useState(false);
  const [streamModal, setStreamModal] = useState(null);
  const [unwatchedModal, setUnwatchedModal] = useState(false);
  const [toast, setToast] = useState(null);

  // Jellyseerr search
  const [searchQ, setSearchQ] = useState('');
  const [searchRes, setSearchRes] = useState([]);
  const [searching, setSearching] = useState(false);

  // Collection create
  const [colType, setColType] = useState('genre');
  const [colGenre, setColGenre] = useState('Action');
  const [colYear, setColYear] = useState('2020');
  const [colActor, setColActor] = useState('');
  const [colLib, setColLib] = useState('');
  const [colCreating, setColCreating] = useState(false);
  const [colResult, setColResult] = useState(null);

  // History filters
  const [histUser, setHistUser] = useState('');
  const [histSearch, setHistSearch] = useState('');

  // Unwatched
  const [uwLib, setUwLib] = useState('');
  const [uwData, setUwData] = useState(null);
  const [uwLoading, setUwLoading] = useState(false);

  const [widgets, setWidgets] = useState(() => {
    const s = localStorage.getItem('widgets_v252');
    return s ? JSON.parse(s) : ['serverStatus','activeStreams','systemAlerts','topUser','resources','jellyseerr','collections'];
  });
  const [widgetSettings, setWidgetSettings] = useState(false);

  // LiveTV state
  const [ltvView, setLtvView] = useState('nowplaying');
  const [ltvChannels, setLtvChannels] = useState([]);
  const [ltvNowPlaying, setLtvNowPlaying] = useState([]);
  const [ltvGuide, setLtvGuide] = useState([]);
  const [ltvGenres, setLtvGenres] = useState([]);
  const [ltvFillers, setLtvFillers] = useState([]);
  const [ltvScanning, setLtvScanning] = useState(false);
  const [ltvChannelModal, setLtvChannelModal] = useState(null);
  const [ltvNewCh, setLtvNewCh] = useState({number:'',name:'',source_type:'genre',source_value:'',library_key:'',shuffle:false});
  const [ltvRuleModal, setLtvRuleModal] = useState(null);
  const [ltvNewRule, setLtvNewRule] = useState({name:'',rule_type:'seasonal',start_month:1,end_month:12,genre_boost:'',boost_pct:20});
  const [ltvAutoBuild, setLtvAutoBuild] = useState(false);
  const [ltvAB, setLtvAB] = useState({genre:'Comedy',content_type:'episode',year_from:'',year_to:'',shuffle:true,start_number:'',genre_mode:'primary',exclude_genres:[],library_key:''});
  const [ltvABPreview, setLtvABPreview] = useState(null);
  const [ltvABLoading, setLtvABLoading] = useState(false);
  const [ltvSuccess, setLtvSuccess] = useState(null);

  // YouTube filler download state
  const [ytModal, setYtModal] = useState(false);
  const [ytUrl, setYtUrl] = useState('');
  const [ytInfo, setYtInfo] = useState(null);
  const [ytInfoLoading, setYtInfoLoading] = useState(false);
  const [ytQuality, setYtQuality] = useState('480p');
  const [ytDownloads, setYtDownloads] = useState([]);
  const [ytDiskSpace, setYtDiskSpace] = useState(null);
  const [ytSelectedChannels, setYtSelectedChannels] = useState([]);

  const showToast = (msg, type='success') => {
    setToast({msg, type});
    setTimeout(() => setToast(null), 3000);
  };

  // Auth check on mount
  useEffect(() => {
    fetch('/api/auth/me').then(r => {
      if (r.ok) return r.json();
      throw new Error('not authenticated');
    }).then(data => {
      setCurrentUser(data.user);
      setAuthState('authenticated');
    }).catch(() => setAuthState('login'));
  }, []);

  const doLogin = async (e) => {
    e && e.preventDefault();
    setLoginLoading(true); setLoginError('');
    try {
      const r = await fetch('/api/auth/login', {
        method: 'POST', headers: {'Content-Type':'application/json'},
        body: JSON.stringify({username: loginUser, password: loginPass})
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Login failed');
      setCurrentUser(data.user); setAuthState('authenticated');
    } catch(err) { setLoginError(err.message); }
    setLoginLoading(false);
  };

  const doPlexLogin = async () => {
    setLoginLoading(true); setLoginError('');
    try {
      // Create a Plex PIN
      const pinRes = await fetch('https://plex.tv/api/v2/pins?strong=true', {
        method: 'POST',
        headers: {
          'Accept': 'application/json',
          'X-Plex-Product': 'Plex Command Center',
          'X-Plex-Client-Identifier': 'pcc-' + (localStorage.getItem('pcc_client_id') || (() => { const id = Math.random().toString(36).slice(2); localStorage.setItem('pcc_client_id', id); return id; })())
        }
      });
      const pin = await pinRes.json();
      const clientId = localStorage.getItem('pcc_client_id');
      // Open Plex auth in popup
      const authUrl = `https://app.plex.tv/auth#?clientID=${clientId}&code=${pin.code}&context%5Bdevice%5D%5Bproduct%5D=Plex%20Command%20Center`;
      const popup = window.open(authUrl, 'PlexAuth', 'width=800,height=600');
      // Poll for token
      const pollInterval = setInterval(async () => {
        try {
          const checkRes = await fetch(`https://plex.tv/api/v2/pins/${pin.id}`, {
            headers: { 'Accept': 'application/json', 'X-Plex-Client-Identifier': clientId }
          });
          const checkData = await checkRes.json();
          if (checkData.authToken) {
            clearInterval(pollInterval);
            if (popup && !popup.closed) popup.close();
            // Exchange Plex token for PCC session
            const loginRes = await fetch('/api/auth/login/plex', {
              method: 'POST', headers: {'Content-Type':'application/json'},
              body: JSON.stringify({authToken: checkData.authToken})
            });
            const loginData = await loginRes.json();
            if (!loginRes.ok) throw new Error(loginData.error || 'Plex login failed');
            setCurrentUser(loginData.user); setAuthState('authenticated');
            setLoginLoading(false);
          }
        } catch(e) { /* keep polling */ }
      }, 2000);
      // Timeout after 5 minutes
      setTimeout(() => { clearInterval(pollInterval); setLoginLoading(false); }, 300000);
    } catch(err) {
      setLoginError(err.message);
      setLoginLoading(false);
    }
  };

                        <div className="card-header">

                              {np.nextOnAirTime ? `Resumes ${new Date(np.nextOnAirTime).toLocaleString([], {weekday:'short',hour:'numeric',minute:'2-digit'})}` : 'No schedule set'}
                            </div>
                          </div>
                        ) : np.current ? (
                          <div>
                            <div style={{display:'flex',gap:'.75rem',marginBottom:'.75rem'}}>
                              {np.current.thumb ? (
                                <img src={np.current.thumb} style={{width:'70px',height:'100px',borderRadius:'6px',objectFit:'cover'}} alt=""/>
                              ) : (
                                <div style={{width:'70px',height:'100px',borderRadius:'6px',background:'linear-gradient(135deg,#1e3a5f,#2d1f6e)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.5rem'}}>

                                </div>

                              <div style={{flex:1,minWidth:0}}>
                                <div style={{fontWeight:600,fontSize:'.9rem',marginBottom:'.2rem',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>
                                  {np.current.title}

                                {np.current.seasonNum && <div style={{fontSize:'.7rem',color:'#94a3b8'}}>S{String(np.current.seasonNum).padStart(2,'0')}E{String(np.current.episodeNum).padStart(2,'0')}</div>}

                                </div>

                              <div className="progress-bar" style={{width:`${np.current.progress}%`}}></div>

                              <span>{fmt(Math.floor(np.current.remainingMs/1000))} remaining</span>

                            {np.next && (

                                {np.next.showTitle && <span style={{color:'#a78bfa'}}> ({np.next.showTitle})</span>}

                        )}
                      </div>
                    ))}
                  </div>

              <div style={{overflowX:'auto'}}>
                {ltvGuide.length===0 ? (
                  <div className="empty">No guide data available. Create channels first.</div>
                ) : (
                  <div style={{minWidth:'900px'}}>
                    {(() => {
                      const now = Date.now();
                      const guideStart = now - 1800000;
                      const guideEnd = now + 6*3600000;
                      const totalMs = guideEnd - guideStart;
                      const hourMarkers = [];
                      const startHour = new Date(guideStart);
                      startHour.setMinutes(0,0,0);
                      for (let t = startHour.getTime(); t < guideEnd; t += 3600000) {
                        if (t >= guideStart) hourMarkers.push(t);
                      }
                      return (
                        <div>
                          {/* Time header */}
                          <div style={{display:'flex',marginLeft:'140px',position:'relative',height:'30px',borderBottom:'1px solid rgba(100,116,139,.2)',marginBottom:'2px'}}>
                            {hourMarkers.map(t => (
                              <div key={t} style={{position:'absolute',left:`${((t-guideStart)/totalMs)*100}%`,fontSize:'.7rem',color:'#94a3b8',borderLeft:'1px solid rgba(100,116,139,.2)',paddingLeft:'4px',height:'100%'}}>
                                {new Date(t).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}
                              </div>
                            ))}
                            {/* Current time marker */}
                            <div style={{position:'absolute',left:`${((now-guideStart)/totalMs)*100}%`,width:'2px',height:'100%',background:'#ef4444',zIndex:10}}/>
                          </div>
                          {/* Channel rows */}
                          {ltvGuide.map(g => (
                            <div key={g.channel.id} style={{display:'flex',marginBottom:'2px',height:'60px'}}>
                              <div style={{width:'140px',flexShrink:0,display:'flex',alignItems:'center',gap:'.5rem',padding:'.5rem',background:'rgba(15,23,42,.6)',borderRadius:'6px 0 0 6px',borderRight:'1px solid rgba(100,116,139,.2)'}}>
                                <span style={{background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',padding:'.1rem .4rem',borderRadius:'3px',fontSize:'.65rem',fontWeight:700}}>{g.channel.number}</span>
                                <span style={{fontSize:'.75rem',fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{g.channel.name}</span>
                              </div>
                              <div style={{flex:1,position:'relative',overflow:'hidden',background:'rgba(15,23,42,.3)',borderRadius:'0 6px 6px 0'}}>
                                {g.programs.map((p, i) => {
                                  const pStart = Math.max(p.startMs || new Date(p.start).getTime(), guideStart);
                                  const pEnd = Math.min(p.stopMs || new Date(p.stop).getTime(), guideEnd);
                                  if (pEnd <= guideStart || pStart >= guideEnd) return null;
                                  const left = ((pStart - guideStart) / totalMs) * 100;
                                  const width = ((pEnd - pStart) / totalMs) * 100;
                                  const isNow = pStart <= now && pEnd > now;
                                  return (
                                    <div key={i} title={`${p.title}${p.showTitle?' - '+p.showTitle:''}\n${new Date(p.start).toLocaleTimeString()} - ${new Date(p.stop).toLocaleTimeString()}`}
                                      style={{position:'absolute',left:`${left}%`,width:`${width}%`,height:'100%',
                                        background:isNow?'rgba(59,130,246,.25)': p.type==='filler'?'rgba(139,92,246,.15)':'rgba(15,23,42,.5)',
                                        border:`1px solid ${isNow?'rgba(59,130,246,.5)':'rgba(100,116,139,.15)'}`,
                                        borderRadius:'3px',padding:'.25rem .4rem',overflow:'hidden',cursor:'default',
                                        display:'flex',flexDirection:'column',justifyContent:'center'}}>

                                      <div style={{fontSize:'.6rem',color:'#94a3b8'}}>{new Date(p.start).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>
                                    </div>
                                  );

                                <div style={{position:'absolute',left:`${((now-guideStart)/totalMs)*100}%`,width:'2px',height:'100%',background:'#ef4444',zIndex:5}}/>
                              </div>
                            </div>
                          ))}
                        </div>
                      );
                    })()}
                  </div>
                )}
              </div>

                          <button className={`btn-sm ${ch.enabled?'btn-approve':'btn-decline'}`} onClick={()=>ltvToggleChannel(ch)}>
                            {ch.enabled?'Enabled':'Disabled'}
                          </button>
                          <button className="btn-sm btn-outline" onClick={()=>ltvRebuildChannel(ch.id)}>Rebuild</button>
                          <button className="btn-sm btn-outline" onClick={()=>setLtvRuleModal(ch.id)}>Rules</button>
                          <button className="btn-sm btn-delete" onClick={()=>ltvDeleteChannel(ch.id)}>Delete</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* --- FILLERS --- */}
            {ltvView==='fillers' && (
              <div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}}>

                  <div style={{display:'flex',gap:'.5rem'}}>
                    <button className="btn btn-primary" onClick={()=>{setYtModal(true);ytLoadDownloads();}}>Download from YouTube</button>
                    <button className="btn btn-primary" onClick={ltvScanTrailers}>Scan Trailers from Plex</button>
                  </div>
                </div>

                {/* Active Downloads */}
                {ytDownloads.filter(d=>d.status==='downloading'||d.status==='processing'||d.status==='pending').length > 0 && (
                  <div style={{marginBottom:'1.5rem'}}>
                    <div style={{fontSize:'.85rem',fontWeight:600,marginBottom:'.5rem'}}>Active Downloads</div>

                      <div key={d.id} className="stream-card" style={{display:'flex',alignItems:'center',gap:'1rem'}}>
                        <div style={{width:'40px',height:'40px',borderRadius:'8px',background:'rgba(239,68,68,.2)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:'1.2rem'}}>⬇️</div>

                          <div className="progress-wrap" style={{marginTop:'.3rem'}}>
                            <div className="progress-bar" style={{width:`${d.progress}%`}}></div>
                          </div>
                        </div>
                        <span style={{fontSize:'.8rem',fontWeight:700}}>{d.progress}%</span>
                        <button className="btn-sm btn-delete" onClick={()=>ytCancelDownload(d.id)}>Cancel</button>
                      </div>
                    ))}
                  </div>

                {/* Recently completed/failed */}
                {ytDownloads.filter(d=>d.status==='done'||d.status==='error').length > 0 && (
                  <div style={{marginBottom:'1.5rem'}}>
                    <div style={{fontSize:'.85rem',fontWeight:600,marginBottom:'.5rem',color:'#94a3b8'}}>Recent Downloads</div>

                      <div key={d.id} className="stream-card" style={{display:'flex',alignItems:'center',gap:'1rem',opacity: d.status==='error'?.6:1}}>
                        <span className={`status-badge ${d.status==='done'?'status-approved':'status-declined'}`}>{d.status}</span>
                        <div style={{flex:1}}>
                          <div style={{fontWeight:500,fontSize:'.85rem'}}>{d.title || 'Unknown'}</div>
                          <div style={{fontSize:'.7rem',color:'#94a3b8'}}>
                            {d.status==='done' ? `${d.quality} | ${d.file_size_bytes ? fmtBytes(d.file_size_bytes) : ''} | ${d.duration_ms ? fmt(Math.floor(d.duration_ms/1000)) : ''}` : d.error_msg || 'Failed'}

                        </div>
                        <button className="btn-sm btn-delete" onClick={()=>ytCancelDownload(d.id)}>Remove</button>

                {ltvFillers.length===0 ? (

                      </div>

                  </div>
                )}
              </div>

              <div>
                <div className="card" style={{maxWidth:'700px',margin:'0 auto'}}>

                      <div className="form-label" style={{fontWeight:700}}>Tuner Device URL (enter this in Plex)</div>
                      <div style={{display:'flex',gap:'.5rem'}}>
                        <input className="form-input" readOnly value={`${window.location.origin}`} onClick={e=>e.target.select()} style={{fontWeight:600}}/>
                        <button className="btn btn-primary" onClick={()=>{navigator.clipboard.writeText(`${window.location.origin}`);showToast('Copied!');}}>Copy</button>

                    </div>

                    <div className="alert-box alert-info" style={{marginBottom:'1rem'}}>
                      <strong>Tailscale users:</strong> If Plex runs on a different machine, use your Tailscale IP: <code>http://100.x.x.x:3001</code>
                    </div>

                    <div style={{marginBottom:'.5rem',fontWeight:600}}>Steps to Add to Plex:</div>
                    <ol style={{paddingLeft:'1.5rem',color:'#94a3b8'}}>
                      <li style={{marginBottom:'.4rem'}}>Go to Plex Settings &gt; <strong>Live TV & DVR</strong></li>
                      <li style={{marginBottom:'.4rem'}}>Click <strong>"Set Up Plex DVR"</strong> or add a new device</li>
                      <li style={{marginBottom:'.4rem'}}>Plex will scan for devices. If not found, click <strong>"Don't see your HDHomeRun device? Enter its network address manually"</strong></li>
                      <li style={{marginBottom:'.4rem'}}>Paste the <strong>Tuner Device URL</strong> above</li>
                      <li style={{marginBottom:'.4rem'}}>Plex will detect <strong>"Plex Command Center LiveTV"</strong> with your channels</li>
                      <li style={{marginBottom:'.4rem'}}>For the <strong>Program Guide</strong>, select "XMLTV" and paste the XMLTV URL</li>
                      <li>Map the channels and you're done!</li>

                </div>
              </div>

          </div>

      </main>

      {/* ============ SERVER DETAILS MODAL ============ */}
      {serverModal && (
        <div className="overlay" onClick={()=>setServerModal(false)}>
          <div className="modal wide" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">🖥️ {status?.friendlyName || 'Server Details'}</div>
              <button className="modal-close" onClick={()=>setServerModal(false)}>✕</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1.25rem'}}>
              {[
                ['Status', status?.online?'🟢 Online':'🔴 Offline'],
                ['Server Name', status?.friendlyName||'Unknown'],
                ['Version', status?.version||'Unknown'],
                ['Platform', `${status?.platform||'?'} ${status?.platformVersion||''}`],
                ['Local IP', status?.localIP||'Unknown'],
                ['Tailscale IP', status?.tailscaleIP||'Check Zabbix'],
                ['Libraries', `${status?.libraryCount||0} libraries`],
                ['Active Streams', streams.length],
              ].map(([l,v],i)=>(
                <div key={i} style={{padding:'.9rem',background:'rgba(15,23,42,.5)',borderRadius:'8px'}}>
                  <div style={{fontSize:'.75rem',color:'#94a3b8',marginBottom:'.25rem'}}>{l}</div>
                  <div style={{fontWeight:700,fontSize:'1rem'}}>{v}</div>
                </div>
              ))}
            </div>
            <div className="modal-title" style={{fontSize:'1rem',marginBottom:'.75rem'}}>📚 Libraries</div>

                <span style={{fontWeight:500}}>{lib.title}</span>
                <span style={{color:'#94a3b8',fontSize:'.85rem'}}>{lib.type} • {lib.count} items</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ============ USER DETAILS MODAL ============ */}
      {userModal && (
        <div className="overlay" onClick={()=>setUserModal(null)}>
          <div className="modal wide" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">👤 {userModal.friendly_name||userModal.username}</div>
              <button className="modal-close" onClick={()=>setUserModal(null)}>✕</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
              {[
                ['Total Plays', userModal.total_plays||userModal.plays||0],
                ['Total Watch Time', Math.round(((userModal.total_duration||userModal.duration)||0)/3600)+'h'],
                ['Last Seen', userModal.last_seen?new Date(userModal.last_seen*1000).toLocaleString():'Never'],
                ['Last Played', userModal.last_played||'Unknown'],
                ['IP Address', userModal.ip_address||'Unknown'],
                ['Platform', userModal.platform||'Unknown'],
                ['Player', userModal.player||'Unknown'],
                ['Server Owner', (userModal.is_home_user===1 || userModal.is_allow_sync===1)?'Yes':'No'],
              ].map(([l,v],i)=>(
                <div key={i} style={{padding:'.9rem',background:'rgba(15,23,42,.5)',borderRadius:'8px'}}>
                  <div style={{fontSize:'.75rem',color:'#94a3b8',marginBottom:'.25rem'}}>{l}</div>
                  <div style={{fontWeight:700}}>{v}</div>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* ============ ALL USERS MODAL ============ */}
      {allUsersModal && (
        <div className="overlay" onClick={()=>setAllUsersModal(false)}>
          <div className="modal wide" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">👥 All Users ({topUsers.length})</div>
              <button className="modal-close" onClick={()=>setAllUsersModal(false)}>✕</button>
            </div>
            {topUsers.map((u,i)=>(
              <div key={i} className="user-row" onClick={()=>{setAllUsersModal(false);setUserModal(u);}}>
                <div style={{width:'28px',height:'28px',borderRadius:'50%',background:'linear-gradient(135deg,#3b82f6,#8b5cf6)',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:700,fontSize:'.8rem'}}>#{i+1}</div>
                <div className="avatar" style={{width:'34px',height:'34px',fontSize:'.8rem'}}>
                  {(u.friendly_name||u.username||'?')[0].toUpperCase()}
                </div>
                <div style={{flex:1}}>
                  <div style={{fontWeight:600}}>{u.friendly_name||u.username}</div>
                  <div style={{fontSize:'.75rem',color:'#94a3b8'}}>{u.total_plays||u.plays||0} plays • {Math.round(((u.total_duration||u.duration)||0)/3600)}h • Last: {u.last_seen?new Date(u.last_seen*1000).toLocaleDateString():'Never'}</div>
                </div>
                <span style={{color:'#60a5fa',fontWeight:700}}>{u.total_plays||u.plays||0} plays</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ============ JELLYSEERR SEARCH MODAL ============ */}
      {jellyseerrModal && (
        <div className="overlay" onClick={()=>setJellyseerrModal(false)}>
          <div className="modal xl" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">🔍 Search & Request Media</div>
              <button className="modal-close" onClick={()=>setJellyseerrModal(false)}>✕</button>
            </div>
            <div style={{display:'flex',gap:'.75rem',marginBottom:'1.25rem'}}>
              <input className="form-input" placeholder="Search movies & TV shows..." value={searchQ}
                onChange={e=>setSearchQ(e.target.value)} onKeyPress={e=>e.key==='Enter'&&searchJelly()} style={{flex:1}}/>
              <button className="btn btn-primary" onClick={searchJelly} disabled={searching}>
                {searching?'Searching...':'Search'}
              </button>
            </div>

            {/* All Requests List */}
            <div className="modal-title" style={{fontSize:'1rem',marginBottom:'.75rem'}}>All Requests</div>
            <div style={{maxHeight:'200px',overflowY:'auto',marginBottom:'1.25rem'}}>
              {requests.map((req,i)=>(
                <div key={i} className="req-card">
                  {req.posterPath
                    ? <img src={req.posterPath} className="req-poster" alt="" onError={e=>e.target.style.display='none'}/>
                    : <div className="req-poster-placeholder">{req.type==='movie'?'🎬':'📺'}</div>
                  }
                  <div className="req-info">
                    <div className="req-title">{req.title}{req.year?` (${req.year})`:''}</div>
                    <div className="req-meta">by {req.requestedBy} • {ago(req.createdAt)}</div>
                  </div>
                  <div className="req-actions">
                    {req.status==='pending'?(
                      <><button className="btn-sm btn-approve" onClick={()=>approveReq(req.id)}>✓ Approve</button>
                      <button className="btn-sm btn-decline" onClick={()=>declineReq(req.id)}>✗ Decline</button></>
                    ):<span className={`status-badge status-${req.status}`}>{req.status}</span>}
                    <button className="btn-sm btn-delete" onClick={()=>deleteReq(req.id)}>🗑️</button>
                  </div>
                </div>
              ))}
            </div>

            {/* Search Results */}
            {searchRes.length > 0 && (
              <>
                <div className="modal-title" style={{fontSize:'1rem',marginBottom:'.75rem'}}>Search Results</div>
                <div className="search-grid">
                  {searchRes.map((r,i)=>(
                    <div key={i} className="search-card">
                      {r.posterPath
                        ? <img src={`https://image.tmdb.org/t/p/w200${r.posterPath}`} className="search-poster" alt="" onError={e=>e.target.style.display='none'}/>
                        : <div style={{width:'100%',aspectRatio:'2/3',background:'linear-gradient(135deg,#1e3a5f,#2d1f6e)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'2rem'}}>{r.mediaType==='movie'?'🎬':'📺'}</div>
                      }
                      <div className="search-info">
                        <div className="search-title">{r.title||r.name}</div>
                        <div className="search-meta">{r.mediaType} • {(r.releaseDate||r.firstAirDate||'').substring(0,4)}</div>
                        {r.mediaInfo?.status === 5 ? (
                          <div className="status-badge status-available" style={{width:'100%',textAlign:'center',padding:'.4rem',fontSize:'.75rem',marginTop:'.5rem'}}>✓ Available in Plex</div>
                        ) : r.mediaInfo?.status === 3 || r.mediaInfo?.status === 4 ? (
                          <div className="status-badge" style={{width:'100%',textAlign:'center',padding:'.4rem',fontSize:'.75rem',background:'#3b82f6',marginTop:'.5rem'}}>⏳ Requested</div>
                        ) : (
                          <button className="btn btn-primary" style={{width:'100%',padding:'.4rem',fontSize:'.75rem'}} onClick={()=>requestMedia(r)}>+ Request</button>
                        )}
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        </div>
      )}

      {/* ============ COLLECTION CREATOR MODAL ============ */}
      {colModal && (
        <div className="overlay" onClick={()=>setColModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">📚 Create Collection</div>
              <button className="modal-close" onClick={()=>setColModal(false)}>✕</button>
            </div>
            {colResult && <div className={`alert-box alert-${colResult.type}`} style={{marginBottom:'1rem'}}>{colResult.msg}</div>}
            <div className="form-row">
              <label className="form-label">Library</label>
              <select className="form-select" value={colLib} onChange={e=>setColLib(e.target.value)}>
                <option value="">Select library...</option>
                {libraries.filter(l=>l.type==='movie'||l.type==='show').map(l=>(
                  <option key={l.key} value={l.key}>{l.title} ({l.count} items)</option>
                ))}
              </select>
            </div>
            <div className="form-row">
              <label className="form-label">Create By</label>
              <select className="form-select" value={colType} onChange={e=>setColType(e.target.value)}>
                <option value="genre">Genre</option>
                <option value="year">Decade</option>
                <option value="actor">Actor</option>
              </select>
            </div>
            {colType==='genre' && (
              <div className="form-row">
                <label className="form-label">Genre</label>
                <select className="form-select" value={colGenre} onChange={e=>setColGenre(e.target.value)}>
                  {['Action','Adventure','Animation','Comedy','Crime','Documentary','Drama','Family','Fantasy','History','Horror','Music','Mystery','Romance','Science Fiction','Thriller','War','Western'].map(g=>(
                    <option key={g}>{g}</option>
                  ))}
                </select>
              </div>
            )}
            {colType==='year' && (
              <div className="form-row">
                <label className="form-label">Decade Start Year</label>
                <select className="form-select" value={colYear} onChange={e=>setColYear(e.target.value)}>
                  {['2020','2010','2000','1990','1980','1970','1960'].map(y=>(
                    <option key={y} value={y}>{y}s</option>
                  ))}
                </select>
              </div>
            )}
            {colType==='actor' && (
              <div className="form-row">
                <label className="form-label">Actor Name</label>
                <input className="form-input" placeholder="e.g. Tom Hanks" value={colActor} onChange={e=>setColActor(e.target.value)}/>
              </div>
            )}
            <button className="btn btn-primary" onClick={createCollection} disabled={colCreating} style={{width:'100%',padding:'.75rem'}}>
              {colCreating ? '⏳ Creating...' : '✨ Create Collection'}
            </button>
          </div>
        </div>
      )}

      {/* ============ STREAM DETAILS MODAL ============ */}
      {streamModal && (
        <div className="overlay" onClick={()=>setStreamModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">▶️ Stream Details</div>
              <button className="modal-close" onClick={()=>setStreamModal(null)}>✕</button>
            </div>
            {[['User',streamModal.user],['Content',streamModal.content],['IP Address',streamModal.ip],['Device',streamModal.device],['Platform',streamModal.platform],['Quality',streamModal.quality],['Progress',`${streamModal.progress}%`],['Transcoding',streamModal.transcoding?'Yes':'No (Direct Play)'],['Bandwidth',`${streamModal.bandwidth} KB/s`],['State',streamModal.state]].map(([l,v],i)=>(
              <div key={i} className="info-row">
                <span className="info-label">{l}</span>
                <span className="info-val">{v||'Unknown'}</span>
              </div>
            ))}
            <button className="btn btn-primary" style={{width:'100%',marginTop:'1rem',background:'linear-gradient(135deg,#ef4444,#dc2626)'}} onClick={()=>{stopStream(streamModal.sessionId);setStreamModal(null);}}>⏹️ Stop Stream</button>
          </div>
        </div>
      )}

      {/* ============ UNWATCHED REPORT MODAL ============ */}
      {unwatchedModal && (
        <div className="overlay" onClick={()=>setUnwatchedModal(false)}>
          <div className="modal wide" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">📊 Unwatched Report</div>
              <button className="modal-close" onClick={()=>setUnwatchedModal(false)}>✕</button>
            </div>
            <div className="form-row">
              <label className="form-label">Library</label>
              <select className="form-select" value={uwLib} onChange={e=>setUwLib(e.target.value)}>
                <option value="">Select library...</option>
                {libraries.map(l=><option key={l.key} value={l.key}>{l.title}</option>)}
              </select>
            </div>
            <button className="btn btn-primary" onClick={genUnwatched} disabled={uwLoading} style={{marginBottom:'1.25rem'}}>
              {uwLoading?'Generating...':'Generate Report'}
            </button>
            {uwData && (
              <div>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'.75rem'}}>
                  <span style={{fontWeight:600}}>{uwData.totalItems} unwatched items • {fmtBytes(uwData.totalSize)}</span>
                  <button className="btn-sm btn-outline" onClick={exportCSV}>📥 Export CSV</button>
                </div>
                <div style={{maxHeight:'400px',overflowY:'auto'}}>
                  {uwData.items.slice(0,50).map((item,i)=>(
                    <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'.65rem',background:'rgba(15,23,42,.5)',borderRadius:'7px',marginBottom:'.4rem',fontSize:'.85rem'}}>
                      <div>
                        <div style={{fontWeight:600}}>{item.title}</div>
                        <div style={{color:'#94a3b8',fontSize:'.75rem',marginTop:'.2rem'}}>Added: {item.added} • Last watched: {item.lastWatched}</div>
                      </div>
                      <div style={{color:'#94a3b8',textAlign:'right',flexShrink:0}}>
                        <div>{item.type}</div>
                        <div style={{fontSize:'.75rem'}}>{fmtBytes(item.size)}</div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      {/* ============ LIVE TV CHANNEL SUCCESS + TUNER SETUP ============ */}
      {ltvSuccess && (
        <div className="overlay" onClick={()=>setLtvSuccess(null)}>
          <div className="modal wide" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">Channel Created!</div>
              <button className="modal-close" onClick={()=>setLtvSuccess(null)}>✕</button>
            </div>

            <div className="alert-box alert-success" style={{fontSize:'.95rem',marginBottom:'1.25rem'}}>
              <strong>CH {ltvSuccess.number} - {ltvSuccess.name}</strong> is now live!
              {ltvSuccess.programs && <span> ({ltvSuccess.programs} items, {ltvSuccess.hours}h of content)</span>}
            </div>

            <div style={{fontWeight:600,fontSize:'1.05rem',marginBottom:'.75rem'}}>Add to Plex as Live TV Tuner</div>
            <div style={{fontSize:'.85rem',color:'#94a3b8',marginBottom:'1rem'}}>Follow these steps to watch your virtual channels inside the Plex app, just like real TV.</div>

            <div style={{marginBottom:'1.5rem'}}>
              <div className="form-label">Tuner Device URL (enter this in Plex)</div>
              <div style={{display:'flex',gap:'.4rem',marginBottom:'1rem'}}>
                <input className="form-input" readOnly value={`${window.location.origin}`} onClick={e=>e.target.select()} style={{fontSize:'.85rem',fontWeight:600}}/>
                <button className="btn-sm btn-primary" style={{whiteSpace:'nowrap'}} onClick={()=>{navigator.clipboard.writeText(`${window.location.origin}`);showToast('Copied!');}}>Copy</button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
                <div>
                  <div className="form-label" style={{fontSize:'.75rem'}}>M3U Playlist URL (optional/manual)</div>
                  <div style={{display:'flex',gap:'.4rem'}}>
                    <input className="form-input" readOnly value={`${window.location.origin}/api/livetv/m3u`} onClick={e=>e.target.select()} style={{fontSize:'.75rem'}}/>
                    <button className="btn-sm btn-outline" onClick={()=>{navigator.clipboard.writeText(`${window.location.origin}/api/livetv/m3u`);showToast('Copied!');}}>Copy</button>
                  </div>
                </div>
                <div>
                  <div className="form-label" style={{fontSize:'.75rem'}}>XMLTV Guide URL</div>
                  <div style={{display:'flex',gap:'.4rem'}}>
                    <input className="form-input" readOnly value={`${window.location.origin}/api/livetv/xmltv`} onClick={e=>e.target.select()} style={{fontSize:'.75rem'}}/>
                    <button className="btn-sm btn-outline" onClick={()=>{navigator.clipboard.writeText(`${window.location.origin}/api/livetv/xmltv`);showToast('Copied!');}}>Copy</button>
                  </div>
                </div>
              </div>
            </div>

            <div style={{background:'rgba(15,23,42,.5)',borderRadius:'10px',padding:'1.25rem'}}>
              <div style={{fontWeight:600,marginBottom:'.75rem',fontSize:'.9rem'}}>Setup Steps in Plex</div>
              <ol style={{paddingLeft:'1.5rem',fontSize:'.85rem',lineHeight:1.8,color:'#cbd5e1'}}>
                <li><strong>Open Plex</strong> &rarr; Settings &rarr; <strong>Live TV & DVR</strong></li>
                <li>Click <strong>"Set Up Plex DVR"</strong> or add a new device</li>
                <li>Plex will scan for devices. If it doesn't find it automatically, click <strong>"Don't see your HDHomeRun device? Enter its network address manually"</strong></li>
                <li>Paste the <strong>Tuner Device URL</strong> above: <code>{window.location.origin}</code></li>
                <li>Plex will detect it as <strong>"Plex Command Center LiveTV"</strong> with your channels</li>
                <li>For the <strong>Program Guide</strong>, select "XMLTV" and paste the XMLTV URL</li>
                <li>Map the channels and you're done!</li>
              </ol>

              <div className="alert-box alert-info" style={{marginTop:'1rem',fontSize:'.8rem'}}>
                <strong>Tailscale users:</strong> If Plex runs on a different machine, use your Tailscale IP instead: <code>http://100.x.x.x:3001</code>
              </div>
              <div className="alert-box alert-warn" style={{marginTop:'.5rem',fontSize:'.8rem'}}>
                <strong>Note:</strong> Plex Pass is required for Live TV & DVR features. The URLs stay the same as you add more channels.
              </div>
            </div>

            <div style={{marginTop:'1.25rem',display:'flex',gap:'.75rem',justifyContent:'flex-end'}}>
              <button className="btn btn-outline" onClick={()=>setLtvSuccess(null)}>Close</button>
              <button className="btn btn-primary" onClick={()=>{setLtvSuccess(null);setLtvView('nowplaying');}}>View Now Playing</button>
            </div>
          </div>
        </div>

        <div className="overlay" onClick={()=>setLtvAutoBuild(false)}>
          <div className="modal xl" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">Auto Build Channel</div>
              <button className="modal-close" onClick={()=>setLtvAutoBuild(false)}>✕</button>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1.5rem'}}>
              {/* Left: Settings */}
              <div>
                <div style={{fontWeight:600,marginBottom:'1rem',fontSize:'.95rem'}}>Channel Settings</div>
                <div className="form-row">
                  <label className="form-label">Genre *</label>
                  <select className="form-select" value={ltvAB.genre} onChange={e=>setLtvAB(p=>({...p,genre:e.target.value}))}>
                    {ltvGenres.map(g=><option key={g} value={g}>{g}</option>)}
                  </select>
                </div>
                <div className="form-row">
                  <label className="form-label">Genre Match Mode</label>
                  <div className="toggle" style={{width:'100%'}}>
                    <button className={`toggle-opt ${ltvAB.genre_mode==='primary'?'active':''}`} style={{flex:1}} onClick={()=>setLtvAB(p=>({...p,genre_mode:'primary'}))}>Primary Genre Only</button>
                    <button className={`toggle-opt ${ltvAB.genre_mode==='any'?'active':''}`} style={{flex:1}} onClick={()=>setLtvAB(p=>({...p,genre_mode:'any'}))}>Any Match</button>
                  </div>
                  <div style={{fontSize:'.7rem',color:'#94a3b8',marginTop:'.3rem'}}>
                    {ltvAB.genre_mode==='primary'
                      ? 'Only includes content where this is the main genre (e.g. Friends = "Comedy,Romance" matches, The Boys = "Action,Comedy" does not)'
                      : 'Includes any content tagged with this genre, even as secondary'}
                  </div>
                </div>
                <div className="form-row">
                  <label className="form-label">Exclude Genres</label>
                  <div style={{display:'flex',flexWrap:'wrap',gap:'.4rem'}}>
                    {['Animation','Anime','Action','Horror','Sci-Fi & Fantasy','Science Fiction','Documentary'].map(g=>(
                      <button key={g} className={`btn-sm ${ltvAB.exclude_genres.includes(g)?'btn-decline':'btn-outline'}`}
                        style={{fontSize:'.7rem'}}
                        onClick={()=>setLtvAB(p=>({...p,exclude_genres:p.exclude_genres.includes(g)?p.exclude_genres.filter(x=>x!==g):[...p.exclude_genres,g]}))}>
                        {ltvAB.exclude_genres.includes(g)?'✕ ':''}{g}
                      </button>
                    ))}
                  </div>
                  <div style={{fontSize:'.7rem',color:'#94a3b8',marginTop:'.3rem'}}>Click to exclude content also tagged with these genres</div>
                </div>
                <div className="form-row">
                  <label className="form-label">Library</label>
                  <select className="form-select" value={ltvAB.library_key} onChange={e=>setLtvAB(p=>({...p,library_key:e.target.value}))}>
                    <option value="">All Libraries</option>
                    {libraries.map(l=><option key={l.key} value={l.key}>{l.title} ({l.type})</option>)}
                  </select>
                </div>
                <div className="form-row">
                  <label className="form-label">Content Type</label>
                  <select className="form-select" value={ltvAB.content_type} onChange={e=>setLtvAB(p=>({...p,content_type:e.target.value}))}>
                    <option value="all">All (Movies + TV)</option>
                    <option value="episode">TV Episodes Only</option>
                    <option value="movie">Movies Only</option>
                  </select>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'.75rem'}}>
                  <div className="form-row">
                    <label className="form-label">Year From</label>
                    <input className="form-input" type="number" placeholder="Any" value={ltvAB.year_from} onChange={e=>setLtvAB(p=>({...p,year_from:e.target.value}))}/>
                  </div>
                  <div className="form-row">
                    <label className="form-label">Year To</label>
                    <input className="form-input" type="number" placeholder="Any" value={ltvAB.year_to} onChange={e=>setLtvAB(p=>({...p,year_to:e.target.value}))}/>
                  </div>
                </div>
                <div className="form-row">
                  <label className="form-label">Channel Number</label>
                  <input className="form-input" type="number" placeholder="Auto (next available)" value={ltvAB.start_number} onChange={e=>setLtvAB(p=>({...p,start_number:e.target.value}))}/>
                </div>
                <div className="form-row" style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
                  <label className="form-label" style={{marginBottom:0}}>Shuffle Order</label>
                  <button className={`btn-sm ${ltvAB.shuffle?'btn-approve':'btn-outline'}`} onClick={()=>setLtvAB(p=>({...p,shuffle:!p.shuffle}))}>
                    {ltvAB.shuffle?'Shuffled':'In Order'}
                  </button>
                </div>
                <div style={{display:'flex',gap:'.75rem',marginTop:'1.25rem'}}>
                  <button className="btn btn-primary" onClick={ltvPreviewAutoBuild} disabled={ltvABLoading}>
                    {ltvABLoading?'Loading...':'Preview'}
                  </button>
                  {ltvABPreview && ltvABPreview.totalPrograms > 0 && (
                    <button className="btn btn-primary" style={{background:'linear-gradient(135deg,#10b981,#059669)'}} onClick={ltvRunAutoBuild} disabled={ltvABLoading}>
                      Build Channel
                    </button>
                  )}
                </div>
              </div>

              {/* Right: Preview */}
              <div>
                <div style={{fontWeight:600,marginBottom:'1rem',fontSize:'.95rem'}}>Preview</div>
                {!ltvABPreview ? (
                  <div className="empty" style={{padding:'2rem'}}>Click "Preview" to see what content matches your filters</div>
                ) : ltvABPreview.totalPrograms === 0 ? (
                  <div className="alert-box alert-warn">No content found matching those filters. Try a different genre or remove year filters.</div>
                ) : (
                  <div>
                    {/* Stats */}
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'.75rem',marginBottom:'1rem'}}>
                      <div style={{padding:'.75rem',background:'rgba(15,23,42,.5)',borderRadius:'8px',textAlign:'center'}}>
                        <div style={{fontSize:'1.4rem',fontWeight:700,color:'#60a5fa'}}>{ltvABPreview.totalPrograms}</div>
                        <div style={{fontSize:'.7rem',color:'#94a3b8'}}>Total Items</div>
                      </div>
                      <div style={{padding:'.75rem',background:'rgba(15,23,42,.5)',borderRadius:'8px',textAlign:'center'}}>
                        <div style={{fontSize:'1.4rem',fontWeight:700,color:'#a78bfa'}}>{ltvABPreview.totalHours}h</div>
                        <div style={{fontSize:'.7rem',color:'#94a3b8'}}>Total Runtime</div>
                      </div>
                      <div style={{padding:'.75rem',background:'rgba(15,23,42,.5)',borderRadius:'8px',textAlign:'center'}}>
                        <div style={{fontSize:'1.4rem',fontWeight:700,color:'#34d399'}}>{ltvABPreview.shows.length}</div>
                        <div style={{fontSize:'.7rem',color:'#94a3b8'}}>TV Shows</div>
                      </div>
                    </div>

                    {/* Shows breakdown */}
                    {ltvABPreview.shows.length > 0 && (
                      <div style={{marginBottom:'1rem'}}>
                        <div style={{fontSize:'.8rem',fontWeight:600,marginBottom:'.5rem',color:'#cbd5e1'}}>Shows Found</div>
                        <div style={{maxHeight:'200px',overflowY:'auto'}}>
                          {ltvABPreview.shows.map((s,i) => (
                            <div key={i} style={{display:'flex',justifyContent:'space-between',padding:'.4rem .6rem',background:i%2===0?'rgba(15,23,42,.3)':'transparent',borderRadius:'4px',fontSize:'.8rem'}}>
                              <span>{s.name}</span>
                              <span style={{color:'#94a3b8'}}>{s.episodes} eps</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}

                    {/* Sample content */}
                    <div>
                      <div style={{fontSize:'.8rem',fontWeight:600,marginBottom:'.5rem',color:'#cbd5e1'}}>Sample Content</div>
                      <div style={{maxHeight:'180px',overflowY:'auto'}}>
                        {ltvABPreview.sample.map((s,i) => (
                          <div key={i} style={{padding:'.35rem .6rem',fontSize:'.75rem',borderBottom:'1px solid rgba(100,116,139,.1)'}}>
                            <span style={{fontWeight:500}}>{s.title}</span>
                            {s.showTitle && <span style={{color:'#a78bfa'}}> - {s.showTitle}</span>}
                            <span style={{color:'#94a3b8'}}> ({s.duration})</span>
                          </div>
                        ))}
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      )}

      {/* ============ LIVE TV CHANNEL CREATE MODAL ============ */}
      {ltvChannelModal==='new' && (
        <div className="overlay" onClick={()=>setLtvChannelModal(null)}>
          <div className="modal wide" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">New Channel</div>
              <button className="modal-close" onClick={()=>setLtvChannelModal(null)}>✕</button>
            </div>
            <div className="form-row">
              <label className="form-label">Channel Number *</label>
              <input className="form-input" type="number" placeholder="101" value={ltvNewCh.number} onChange={e=>setLtvNewCh(p=>({...p,number:e.target.value}))}/>
            </div>
            <div className="form-row">
              <label className="form-label">Channel Name *</label>
              <input className="form-input" placeholder="Action Movies" value={ltvNewCh.name} onChange={e=>setLtvNewCh(p=>({...p,name:e.target.value}))}/>
            </div>
            <div className="form-row">
              <label className="form-label">Source Type</label>
              <select className="form-select" value={ltvNewCh.source_type} onChange={e=>setLtvNewCh(p=>({...p,source_type:e.target.value,source_value:''}))}>
                <option value="genre">Genre</option>
                <option value="library">Library</option>
                <option value="manual">Manual (All Content)</option>
              </select>
            </div>
            <div className="form-row">
              <label className="form-label">Source Value * {ltvNewCh.source_type==='genre'?'(select a genre)':ltvNewCh.source_type==='library'?'(select a library)':'(type "all")'}</label>
              {ltvNewCh.source_type==='genre' ? (
                <select className="form-select" value={ltvNewCh.source_value} onChange={e=>setLtvNewCh(p=>({...p,source_value:e.target.value}))}>
                  <option value="">-- Select Genre --</option>
                  {ltvGenres.map(g=><option key={g} value={g}>{g}</option>)}
                </select>
              ) : ltvNewCh.source_type==='library' ? (
                <select className="form-select" value={ltvNewCh.source_value} onChange={e=>setLtvNewCh(p=>({...p,source_value:e.target.value,library_key:e.target.value}))}>
                  <option value="">-- Select Library --</option>
                  {libraries.map(l=><option key={l.key} value={l.key}>{l.title} ({l.type})</option>)}
                </select>
              ) : (
                <input className="form-input" placeholder="all" value={ltvNewCh.source_value} onChange={e=>setLtvNewCh(p=>({...p,source_value:e.target.value}))}/>
              )}
            </div>
            <div className="form-row" style={{display:'flex',alignItems:'center',gap:'.75rem'}}>
              <label className="form-label" style={{marginBottom:0}}>Shuffle playlist</label>
              <button className={`btn-sm ${ltvNewCh.shuffle?'btn-approve':'btn-outline'}`} onClick={()=>setLtvNewCh(p=>({...p,shuffle:!p.shuffle}))}>
                {ltvNewCh.shuffle?'Yes':'No'}
              </button>
            </div>
            <div style={{display:'flex',gap:'.75rem',marginTop:'1.5rem'}}>
              <button className="btn btn-primary" onClick={ltvCreateChannel}>Create Channel</button>
              <button className="btn btn-outline" onClick={()=>setLtvChannelModal(null)}>Cancel</button>
            </div>
            {ltvGenres.length===0 && (
              <div className="alert-box alert-warn" style={{marginTop:'1rem'}}>No genres found. Click "Scan Libraries" on the Live TV page first.</div>
            )}
          </div>
        </div>
      )}

      {/* ============ LIVE TV SCHEDULE RULES MODAL ============ */}
      {ltvRuleModal && (
        <div className="overlay" onClick={()=>setLtvRuleModal(null)}>
          <div className="modal wide" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">Schedule Rules - Channel #{ltvRuleModal}</div>
              <button className="modal-close" onClick={()=>setLtvRuleModal(null)}>✕</button>
            </div>
            {(() => {
              const ch = ltvChannels.find(c=>c.id===ltvRuleModal);
              const rules = ch?.rules || [];
              return (
                <div>
                  {rules.length > 0 && (
                    <div style={{marginBottom:'1.5rem'}}>
                      <div style={{fontWeight:600,marginBottom:'.5rem'}}>Active Rules</div>
                      {rules.map(r=>(
                        <div key={r.id} className="stream-card" style={{display:'flex',alignItems:'center',gap:'1rem'}}>
                          <div style={{flex:1}}>
                            <div style={{fontWeight:500,fontSize:'.85rem'}}>{r.name}</div>
                            <div style={{fontSize:'.7rem',color:'#94a3b8'}}>
                              {r.rule_type} | Boost: {r.genre_boost} +{r.boost_pct}%
                              {r.start_month && ` | Months ${r.start_month}-${r.end_month}`}
                            </div>
                          </div>
                          <button className="btn-sm btn-delete" onClick={()=>ltvDeleteRule(r.id)}>Delete</button>
                        </div>
                      ))}
                    </div>
                  )}
                  <div style={{fontWeight:600,marginBottom:'.75rem'}}>Add New Rule</div>
                  <div className="form-row">
                    <label className="form-label">Rule Name</label>
                    <input className="form-input" placeholder="October Horror Boost" value={ltvNewRule.name} onChange={e=>setLtvNewRule(p=>({...p,name:e.target.value}))}/>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
                    <div className="form-row">
                      <label className="form-label">Start Month (1-12)</label>
                      <input className="form-input" type="number" min="1" max="12" value={ltvNewRule.start_month} onChange={e=>setLtvNewRule(p=>({...p,start_month:parseInt(e.target.value)}))}/>
                    </div>
                    <div className="form-row">
                      <label className="form-label">End Month (1-12)</label>
                      <input className="form-input" type="number" min="1" max="12" value={ltvNewRule.end_month} onChange={e=>setLtvNewRule(p=>({...p,end_month:parseInt(e.target.value)}))}/>
                    </div>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem'}}>
                    <div className="form-row">
                      <label className="form-label">Genre to Boost</label>
                      <select className="form-select" value={ltvNewRule.genre_boost} onChange={e=>setLtvNewRule(p=>({...p,genre_boost:e.target.value}))}>
                        <option value="">-- Select --</option>
                        {ltvGenres.map(g=><option key={g} value={g}>{g}</option>)}
                      </select>
                    </div>
                    <div className="form-row">
                      <label className="form-label">Boost Percentage (%)</label>
                      <input className="form-input" type="number" min="5" max="100" value={ltvNewRule.boost_pct} onChange={e=>setLtvNewRule(p=>({...p,boost_pct:parseInt(e.target.value)}))}/>
                    </div>
                  </div>
                  <button className="btn btn-primary" onClick={()=>ltvAddRule(ltvRuleModal)}>Add Rule</button>
                </div>
              );
            })()}
          </div>
        </div>
      )}

      {/* ============ WIDGET SETTINGS MODAL ============ */}
      {/* YouTube Download Modal */}
      {ytModal && (
        <div className="overlay" onClick={()=>setYtModal(false)}>
          <div className="modal wide" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">Download Filler from YouTube</div>
              <button className="modal-close" onClick={()=>setYtModal(false)}>x</button>
            </div>

            <div className="form-row">
              <label className="form-label">YouTube URL</label>
              <div style={{display:'flex',gap:'.5rem'}}>
                <input className="form-input" value={ytUrl} onChange={e=>setYtUrl(e.target.value)} placeholder="https://www.youtube.com/watch?v=..." style={{flex:1}}/>
                <button className="btn btn-primary" onClick={ytCheckInfo} disabled={ytInfoLoading || !ytUrl}>
                  {ytInfoLoading ? 'Checking...' : 'Check'}
                </button>
              </div>
            </div>

            {ytInfo && !ytInfo.error && (
              <div>
                <div className="card" style={{marginBottom:'1.25rem'}}>
                  <div style={{display:'flex',gap:'1rem'}}>
                    {ytInfo.thumbnail && <img src={ytInfo.thumbnail} style={{width:'160px',height:'90px',borderRadius:'8px',objectFit:'cover'}} alt=""/>}
                    <div>
                      <div style={{fontWeight:600,fontSize:'1rem',marginBottom:'.3rem'}}>{ytInfo.title}</div>
                      <div style={{fontSize:'.8rem',color:'#94a3b8'}}>
                        {ytInfo.uploader} | Duration: {fmt(ytInfo.duration)}
                      </div>
                      {ytInfo.description && <div style={{fontSize:'.75rem',color:'#64748b',marginTop:'.3rem'}}>{ytInfo.description}</div>}
                    </div>
                  </div>
                </div>

                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'1rem',marginBottom:'1.25rem'}}>
                  <div className="form-row" style={{marginBottom:0}}>
                    <label className="form-label">Quality</label>
                    <select className="form-select" value={ytQuality} onChange={e=>setYtQuality(e.target.value)}>
                      <option value="360p">360p (~{ytInfo.estimates?.['360p'] ? fmtBytes(ytInfo.estimates['360p']) : '50 MB/hr'})</option>
                      <option value="480p">480p (~{ytInfo.estimates?.['480p'] ? fmtBytes(ytInfo.estimates['480p']) : '100 MB/hr'})</option>
                      <option value="720p">720p (~{ytInfo.estimates?.['720p'] ? fmtBytes(ytInfo.estimates['720p']) : '250 MB/hr'})</option>
                      <option value="1080p">1080p (~{ytInfo.estimates?.['1080p'] ? fmtBytes(ytInfo.estimates['1080p']) : '500 MB/hr'})</option>
                    </select>
                  </div>
                  {ytDiskSpace && (
                    <div style={{padding:'.5rem'}}>
                      <div className="form-label">Disk Space</div>
                      <div style={{fontSize:'.85rem'}}>{fmtBytes(ytDiskSpace.available)} available</div>
                      <div style={{fontSize:'.75rem',color:'#94a3b8'}}>Fillers using: {ytDiskSpace.fillersFormatted}</div>
                      {ytInfo.estimates?.[ytQuality] && ytInfo.estimates[ytQuality] > ytDiskSpace.available && (
                        <div className="alert-box alert-error" style={{marginTop:'.5rem',padding:'.4rem .6rem',fontSize:'.75rem'}}>Not enough space! Try a lower quality.</div>
                      )}
                    </div>
                  )}
                </div>

                <div className="form-row">
                  <label className="form-label">Assign to Channels (optional)</label>
                  <div style={{display:'flex',gap:'.5rem',flexWrap:'wrap'}}>
                    {ltvChannels.map(ch => (
                      <label key={ch.id} style={{display:'flex',alignItems:'center',gap:'.3rem',fontSize:'.8rem',cursor:'pointer',padding:'.3rem .6rem',background:ytSelectedChannels.includes(ch.id)?'rgba(59,130,246,.2)':'rgba(15,23,42,.4)',border:'1px solid',borderColor:ytSelectedChannels.includes(ch.id)?'rgba(59,130,246,.4)':'rgba(100,116,139,.2)',borderRadius:'6px'}}>
                        <input type="checkbox" checked={ytSelectedChannels.includes(ch.id)} onChange={e=>{
                          setYtSelectedChannels(prev=>e.target.checked?[...prev,ch.id]:prev.filter(x=>x!==ch.id));
                        }} style={{accentColor:'#3b82f6'}}/>
                        CH {ch.number} - {ch.name}
                      </label>
                    ))}
                  </div>
                </div>

                <button className="btn btn-primary" style={{width:'100%',padding:'.75rem',marginTop:'.5rem'}} onClick={ytStartDownload}>
                  Download ({ytQuality})
                </button>
              </div>
            )}

            {ytInfo?.error && (
              <div className="alert-box alert-error">{ytInfo.error}</div>
            )}
          </div>
        </div>
      )}

      {widgetSettings && (
        <div className="overlay" onClick={()=>setWidgetSettings(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-head">
              <div className="modal-title">⚙️ Customize Dashboard</div>
              <button className="modal-close" onClick={()=>setWidgetSettings(false)}>✕</button>
            </div>
            {WIDGET_LIST.map(w=>(
              <div key={w.id} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'.9rem',background:'rgba(15,23,42,.4)',borderRadius:'8px',marginBottom:'.5rem'}}>
                <span style={{fontWeight:500}}>{w.name}</span>
                <button className={`btn-sm ${widgets.includes(w.id)?'btn-approve':'btn-outline'}`}
                  onClick={()=>{
                    setWidgets(prev=>{
                      const next=prev.includes(w.id)?prev.filter(x=>x!==w.id):[...prev,w.id];
                      localStorage.setItem('widgets_v252',JSON.stringify(next));
                      return next;
                    });
                  }}>
                  {widgets.includes(w.id)?'✓ Enabled':'Disabled'}
                </button>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

const WIDGET_LIST = [
  {id:'serverStatus',name:'Server Status'},
  {id:'activeStreams',name:'Active Streams'},
  {id:'systemAlerts',name:'System Alerts'},
  {id:'topUser',name:'Top User'},
  {id:'resources',name:'System Resources'},
  {id:'jellyseerr',name:'Recent Requests'},
  {id:'collections',name:'Collections'}
];

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
